<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">Register</h3>

                    <div id="alertMsg" class="alert d-none"></div>

                    <div class="mb-3">
                        <label>Name</label>
                        <input type="text" id="registerName" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" id="registerEmail" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" id="registerPassword" class="form-control">
                    </div>
                    <button class="btn btn-success w-100" id="btnRegister">Register</button>
                    <hr>
                    <p class="text-center">Already have an account? <a href="login.html">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API_URL = 'http://localhost:5000/api/auth';

$('#btnRegister').click(function() {
    const name = $('#registerName').val();
    const email = $('#registerEmail').val();
    const password = $('#registerPassword').val();

    if (!name || !email || !password) {
        showAlert('Please fill in all fields', 'danger');
        return;
    }

    $.ajax({
        url: API_URL + '/register',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ name, email, password }),
        success: function(data) {
            showAlert('Registration successful! Redirecting to login...', 'success');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
        },
        error: function(xhr) {
            const msg = xhr.responseJSON ? xhr.responseJSON.message : 'Registration failed';
            showAlert(msg, 'danger');
        }
    });
});

function showAlert(msg, type) {
    $('#alertMsg').removeClass('d-none alert-success alert-danger')
                  .addClass('alert-' + type)
                  .text(msg);
}
</script>

</body>
</html>
