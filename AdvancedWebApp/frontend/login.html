<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <style>
        :root {
            --seashell:        #FFF4EB;
            --wheat:           #F6E0B6;
            --powder-blue:     #A6BCC9;
            --french-blue:     #3E4B8E;
            --midnight-violet: #3D1534;
        }

        * { box-sizing: border-box; }

        body {
            background: linear-gradient(145deg, var(--powder-blue) 0%, var(--french-blue) 55%, var(--midnight-violet) 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            padding: 2rem 1rem;
        }

        /* ── Page card ─────────────────────────────────── */
        .page-card {
            background: rgba(255, 244, 235, 0.96);
            border-radius: 20px;
            padding: 2rem 2.5rem;
            max-width: 1300px;
            margin: 0 auto;
            box-shadow: 0 12px 48px rgba(61, 21, 52, 0.22);
        }

        /* ── Header row ────────────────────────────────── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.8rem;
            padding-bottom: 1.2rem;
            border-bottom: 2px solid var(--wheat);
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--midnight-violet);
            margin: 0;
            letter-spacing: -0.3px;
        }

        .nav-actions {
            display: flex;
            gap: .5rem;
            flex-wrap: wrap;
        }

        /* ── Unified button style ───────────────────────── */
        .btn-nav {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .45rem 1rem;
            border-radius: 8px;
            font-size: .85rem;
            font-weight: 600;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all .18s ease;
            text-decoration: none;
            white-space: nowrap;
        }

        .btn-ghost {
            background: transparent;
            border-color: var(--powder-blue);
            color: var(--french-blue);
        }
        .btn-ghost:hover {
            background: var(--powder-blue);
            color: var(--midnight-violet);
        }

        .btn-outline {
            background: transparent;
            border-color: var(--french-blue);
            color: var(--french-blue);
        }
        .btn-outline:hover {
            background: var(--french-blue);
            color: var(--seashell);
        }

        .btn-solid {
            background: var(--french-blue);
            border-color: var(--french-blue);
            color: var(--seashell);
        }
        .btn-solid:hover {
            background: var(--midnight-violet);
            border-color: var(--midnight-violet);
            color: var(--wheat);
        }

        /* ── DataTable wrapper ──────────────────────────── */
        .dt-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: .8rem;
            margin-bottom: 1rem;
        }

        .dataTables_wrapper .dataTables_filter,
        .dataTables_wrapper .dataTables_length {
            float: none !important;
        }

        .dataTables_wrapper .dataTables_filter label,
        .dataTables_wrapper .dataTables_length label {
            font-size: .83rem;
            color: var(--french-blue);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: .4rem;
            margin: 0;
        }

        .dataTables_wrapper .dataTables_filter input,
        .dataTables_wrapper .dataTables_length select {
            border: 1.5px solid var(--powder-blue);
            border-radius: 7px;
            padding: .35rem .7rem;
            background: #fff;
            color: var(--midnight-violet);
            font-size: .83rem;
            outline: none;
            transition: border-color .15s;
        }

        .dataTables_wrapper .dataTables_filter input:focus,
        .dataTables_wrapper .dataTables_length select:focus {
            border-color: var(--french-blue);
        }

        /* ── Table ──────────────────────────────────────── */
        #productsTable {
            border-collapse: separate !important;
            border-spacing: 0;
            width: 100% !important;
            border-radius: 12px;
            overflow: hidden;
            border: 1.5px solid var(--powder-blue) !important;
        }

        #productsTable thead tr th {
            background: var(--french-blue);
            color: var(--seashell);
            font-size: .8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            padding: .85rem 1rem;
            border: none !important;
        }

        #productsTable thead tr th.sorting:after,
        #productsTable thead tr th.sorting_asc:after,
        #productsTable thead tr th.sorting_desc:after {
            opacity: .6;
        }

        #productsTable tbody tr {
            transition: background .15s;
        }

        #productsTable tbody tr:nth-child(odd) td {
            background: #fff;
        }

        #productsTable tbody tr:nth-child(even) td {
            background: #fdf7f0;
        }

        #productsTable tbody tr:hover td {
            background: #eaf0f5 !important;
        }

        #productsTable tbody td {
            padding: .75rem 1rem;
            font-size: .875rem;
            color: var(--midnight-violet);
            border-top: 1px solid #ede8e3 !important;
            border-left: none !important;
            border-right: none !important;
            vertical-align: middle;
        }

        /* ID column pill */
        .id-pill {
            display: inline-block;
            background: var(--wheat);
            color: var(--midnight-violet);
            font-weight: 700;
            font-size: .75rem;
            padding: .2rem .55rem;
            border-radius: 20px;
        }

        /* Images in table */
        .thumb-wrap img {
            width: 42px;
            height: 42px;
            object-fit: cover;
            border-radius: 6px;
            border: 1.5px solid var(--powder-blue);
            margin: 1px;
        }

        /* Action buttons in table */
        .action-wrap {
            display: flex;
            gap: .35rem;
        }

        .btn-tbl {
            padding: .3rem .75rem;
            border-radius: 6px;
            font-size: .78rem;
            font-weight: 600;
            border: 1.5px solid transparent;
            cursor: pointer;
            transition: all .15s;
        }

        .btn-tbl-edit {
            background: var(--wheat);
            border-color: #d4b96a;
            color: var(--midnight-violet);
        }
        .btn-tbl-edit:hover {
            background: #e8c97a;
            border-color: #c5a850;
        }

        .btn-tbl-delete {
            background: transparent;
            border-color: var(--midnight-violet);
            color: var(--midnight-violet);
        }
        .btn-tbl-delete:hover {
            background: var(--midnight-violet);
            color: var(--seashell);
        }

        /* ── Pagination ─────────────────────────────────── */
        .dataTables_wrapper .dataTables_paginate {
            margin-top: 1rem;
        }

        .dataTables_wrapper .dataTables_paginate .paginate_button {
            padding: .3rem .7rem !important;
            border-radius: 7px !important;
            font-size: .82rem !important;
            font-weight: 600;
            border: 1.5px solid transparent !important;
            color: var(--french-blue) !important;
            margin: 0 2px;
            transition: all .15s;
        }

        .dataTables_wrapper .dataTables_paginate .paginate_button:hover {
            background: var(--powder-blue) !important;
            border-color: var(--powder-blue) !important;
            color: var(--midnight-violet) !important;
        }

        .dataTables_wrapper .dataTables_paginate .paginate_button.current,
        .dataTables_wrapper .dataTables_paginate .paginate_button.current:hover {
            background: var(--french-blue) !important;
            border-color: var(--french-blue) !important;
            color: #fff !important;
        }

        .dataTables_wrapper .dataTables_paginate .paginate_button.disabled,
        .dataTables_wrapper .dataTables_paginate .paginate_button.disabled:hover {
            color: var(--powder-blue) !important;
            background: transparent !important;
        }

        .dataTables_wrapper .dataTables_info {
            font-size: .82rem;
            color: var(--french-blue);
            font-weight: 500;
            margin-top: 1rem;
        }

        /* ── Modal ──────────────────────────────────────── */
        .modal-content {
            background: var(--seashell);
            border: none;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 16px 56px rgba(61, 21, 52, 0.28);
        }

        .modal-header {
            background: var(--french-blue);
            padding: 1.1rem 1.5rem;
            border: none;
        }

        .modal-title {
            color: var(--seashell);
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: .2px;
        }

        .btn-close { filter: invert(1) brightness(2); }

        .modal-body {
            padding: 1.5rem;
            background: #fff;
        }

        .modal-footer {
            background: #fdf7f0;
            border-top: 1.5px solid var(--wheat);
            padding: .9rem 1.5rem;
        }

        /* Form fields */
        .form-label {
            font-size: .8rem;
            font-weight: 700;
            color: var(--french-blue);
            text-transform: uppercase;
            letter-spacing: .4px;
            margin-bottom: .3rem;
        }

        .form-control {
            border: 1.5px solid #dde4ea;
            border-radius: 8px;
            font-size: .875rem;
            color: var(--midnight-violet);
            background: #fff;
            padding: .5rem .85rem;
            transition: border-color .15s, box-shadow .15s;
        }

        .form-control:focus {
            border-color: var(--french-blue);
            box-shadow: 0 0 0 3px rgba(62, 75, 142, 0.12);
            outline: none;
        }

        .form-control.is-invalid { border-color: #c0392b; }
        .form-control.is-valid   { border-color: #27ae60; }

        .invalid-feedback {
            font-size: .75rem;
            color: #c0392b;
        }

        /* Modal save/close buttons reuse btn-nav */
        .modal-footer .btn-nav { font-size: .85rem; }

        /* ── Scrollbar ──────────────────────────────────── */
        ::-webkit-scrollbar { width: 7px; height: 7px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--powder-blue); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--french-blue); }
    </style>
</head>
<body>

<div class="page-card">

    <!-- Header -->
    <div class="page-header">
        <h1 class="page-title">Products Management</h1>
        <div class="nav-actions">
            <a href="index.html"  class="btn-nav btn-ghost">← Back to Items</a>
            <a href="users.html"  class="btn-nav btn-outline">👥 Users</a>
            <a href="orders.html" class="btn-nav btn-outline">📦 Orders</a>
            <button id="btnAdd"   class="btn-nav btn-solid">+ Add Product</button>
        </div>
    </div>

    <!-- Table -->
    <table id="productsTable" class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Category</th>
                <th>Images</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<!-- Modal -->
<div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Add Product</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="productForm" novalidate>
                    <input type="hidden" id="productId">

                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" id="productName" name="productName" class="form-control" placeholder="Product name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea id="productDescription" name="productDescription" class="form-control" rows="2" placeholder="Short description"></textarea>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label class="form-label">Price</label>
                            <input type="number" id="productPrice" name="productPrice" class="form-control" placeholder="0.00">
                        </div>
                        <div class="col-6">
                            <label class="form-label">Stock</label>
                            <input type="number" id="productStock" name="productStock" class="form-control" placeholder="0">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <input type="text" id="productCategory" name="productCategory" class="form-control" placeholder="e.g. Electronics">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Images <span style="font-weight:400;text-transform:none;color:#888">(up to 5)</span></label>
                        <input type="file" id="productImages" class="form-control" multiple accept="image/*">
                    </div>
                    <div id="currentImages"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-nav btn-ghost" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" form="productForm" class="btn-nav btn-solid" id="btnSave">Save Product</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
const API_URL     = 'http://localhost:5000/api/products';
const UPLOADS_URL = 'http://localhost:5000/uploads/';
let table;
let editMode = false;

function loadProducts() {
    $.ajax({
        url: API_URL + '?page=1&limit=500',
        method: 'GET',
        success: function(response) {
            const data = response.data !== undefined ? response.data : response;

            if ($.fn.DataTable.isDataTable('#productsTable')) {
                $('#productsTable').DataTable().destroy();
            }
            $('#productsTable tbody').empty();

            table = $('#productsTable').DataTable({
                data: data,
                columns: [
                    {
                        data: 'id',
                        render: id => `<span class="id-pill">${id}</span>`
                    },
                    { data: 'name' },
                    { data: 'description' },
                    {
                        data: 'price',
                        render: p => `<strong>$${parseFloat(p).toFixed(2)}</strong>`
                    },
                    { data: 'stock' },
                    { data: 'category' },
                    {
                        data: 'images',
                        render: function(images) {
                            if (!images) return '<span style="color:#aaa;font-size:.8rem">None</span>';
                            return `<div class="thumb-wrap">${
                                images.split(',').map(img =>
                                    `<img src="${UPLOADS_URL}${img}" alt="">`
                                ).join('')
                            }</div>`;
                        }
                    },
                    {
                        data: 'id',
                        render: id => `
                            <div class="action-wrap">
                                <button class="btn-tbl btn-tbl-edit btnEdit"     data-id="${id}">Edit</button>
                                <button class="btn-tbl btn-tbl-delete btnDelete" data-id="${id}">Delete</button>
                            </div>`
                    }
                ]
            });
        },
        error: function(xhr) {
            console.log('Error loading products:', xhr.status, xhr.responseText);
        }
    });
}

function saveProduct() {
    const formData = new FormData();
    formData.append('name',        $('#productName').val());
    formData.append('description', $('#productDescription').val());
    formData.append('price',       $('#productPrice').val());
    formData.append('stock',       $('#productStock').val());
    formData.append('category',    $('#productCategory').val());

    const files = $('#productImages')[0].files;
    for (let i = 0; i < files.length; i++) formData.append('images', files[i]);

    const url    = editMode ? API_URL + '/' + $('#productId').val() : API_URL;
    const method = editMode ? 'PUT' : 'POST';

    $.ajax({
        url, method,
        data: formData,
        processData: false,
        contentType: false,
        success: function() {
            $('#productModal').modal('hide');
            loadProducts();
        },
        error: function() { alert('Error saving product'); }
    });
}

function resetForm() {
    ['productId','productName','productDescription','productPrice','productStock','productCategory'].forEach(id => $(`#${id}`).val(''));
    $('#productImages').val('');
    $('#currentImages').html('');
    if ($('#productForm').data('validator')) $('#productForm').data('validator').resetForm();
    $('#productForm .is-invalid').removeClass('is-invalid');
    $('#productForm .is-valid').removeClass('is-valid');
}

$('#btnAdd').click(function() {
    editMode = false;
    $('#modalTitle').text('Add Product');
    resetForm();
    $('#productModal').modal('show');
});

$(document).on('click', '.btnEdit', function() {
    editMode = true;
    $('#modalTitle').text('Edit Product');
    const id = $(this).data('id');
    $.ajax({
        url: API_URL + '/' + id,
        method: 'GET',
        success: function(product) {
            $('#productId').val(product.id);
            $('#productName').val(product.name);
            $('#productDescription').val(product.description);
            $('#productPrice').val(product.price);
            $('#productStock').val(product.stock);
            $('#productCategory').val(product.category);
            $('#productImages').val('');

            if (product.images) {
                const imgs = product.images.split(',').map(img =>
                    `<img src="${UPLOADS_URL}${img}" style="width:52px;height:52px;object-fit:cover;border-radius:6px;border:1.5px solid var(--powder-blue);margin:2px;">`
                ).join('');
                $('#currentImages').html(`
                    <p style="font-size:.75rem;font-weight:700;color:var(--french-blue);text-transform:uppercase;letter-spacing:.4px;margin-bottom:.4rem">Current Images</p>
                    <div>${imgs}</div>
                `);
            } else {
                $('#currentImages').html('');
            }

            if ($('#productForm').data('validator')) $('#productForm').data('validator').resetForm();
            $('#productForm .is-invalid').removeClass('is-invalid');
            $('#productForm .is-valid').removeClass('is-valid');
            $('#productModal').modal('show');
        }
    });
});

$(document).on('click', '.btnDelete', function() {
    if (confirm('Delete this product?')) {
        $.ajax({
            url: API_URL + '/' + $(this).data('id'),
            method: 'DELETE',
            success: loadProducts,
            error: function() { alert('Error deleting product'); }
        });
    }
});

$(document).ready(function() {
    loadProducts();

    $('#productForm').validate({
        rules: {
            productName:     { required: true, minlength: 2 },
            productPrice:    { required: true, number: true, min: 0 },
            productStock:    { required: true, digits: true, min: 0 },
            productCategory: { required: true }
        },
        messages: {
            productName:     { required: 'Name is required', minlength: 'At least 2 characters' },
            productPrice:    { required: 'Price is required', number: 'Must be a number', min: 'Must be ≥ 0' },
            productStock:    { required: 'Stock is required', digits: 'Whole number only', min: 'Must be ≥ 0' },
            productCategory: { required: 'Category is required' }
        },
        errorClass: 'is-invalid',
        validClass: 'is-valid',
        errorElement: 'div',
        errorPlacement: function(error, element) {
            error.addClass('invalid-feedback');
            element.after(error);
        },
        highlight:   el => $(el).addClass('is-invalid').removeClass('is-valid'),
        unhighlight: el => $(el).removeClass('is-invalid').addClass('is-valid'),
        submitHandler: saveProduct
    });
});
</script>
</body>
</html>
