<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }

        .product-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,.08);
            transition: transform .2s, box-shadow .2s;
            height: 100%;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 20px rgba(0,0,0,.13);
        }
        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px 12px 0 0;
        }
        .product-card .no-image {
            height: 200px;
            background: #e9ecef;
            border-radius: 12px 12px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #adb5bd;
            font-size: 2.5rem;
        }
        .badge-category {
            font-size: .75rem;
            background: #e7f1ff;
            color: #0d6efd;
            border-radius: 20px;
            padding: 3px 10px;
        }
        .price { font-size: 1.2rem; font-weight: 700; color: #198754; }
        .stock-low  { color: #dc3545; font-size: .8rem; }
        .stock-ok   { color: #6c757d; font-size: .8rem; }

        #sentinel { height: 60px; }

        #loadingSpinner {
            display: none;
            text-align: center;
            padding: 20px 0;
        }
        #endMessage {
            display: none;
            text-align: center;
            color: #adb5bd;
            padding: 20px 0;
        }
        .search-bar { max-width: 400px; }
    </style>
</head>
<body>

<nav class="navbar navbar-light bg-white shadow-sm mb-4">
    <div class="container">
        <span class="navbar-brand fw-bold">🛍️ Shop</span>
        <a href="products.html" class="btn btn-outline-secondary btn-sm">Admin ⚙️</a>
    </div>
</nav>

<div class="container">
    <div class="d-flex align-items-center gap-3 mb-4 flex-wrap">
        <input type="text" id="searchInput" class="form-control search-bar"
               placeholder="Search products…">
        <select id="categoryFilter" class="form-select" style="max-width:200px;">
            <option value="">All categories</option>
        </select>
        <span id="resultCount" class="text-muted small ms-auto"></span>
    </div>

    <div class="row g-4" id="productGrid"></div>

    <div id="sentinel"></div>

    <div id="loadingSpinner">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading…</span>
        </div>
        <p class="text-muted mt-2">Loading more products…</p>
    </div>

    <div id="endMessage">
        <p>✅ You've seen all the products!</p>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API_URL     = 'http://localhost:5000/api/products';
const CAT_URL     = 'http://localhost:5000/api/products/categories';
const UPLOADS_URL = 'http://localhost:5000/uploads/';
const PAGE_LIMIT  = 12;

let currentPage   = 1;
let isLoading     = false;
let hasMore       = true;
let searchQuery   = '';
let categoryQuery = '';
let searchTimer   = null;

function buildCard(p) {
    const firstImage = p.images ? p.images.split(',')[0] : null;
    const imgHtml = firstImage
        ? `<img src="${UPLOADS_URL}${firstImage}" alt="${p.name}" loading="lazy">`
        : `<div class="no-image">🖼️</div>`;

    const stockBadge = p.stock <= 0
        ? `<span class="stock-low">Out of stock</span>`
        : p.stock <= 5
            ? `<span class="stock-low">Only ${p.stock} left!</span>`
            : `<span class="stock-ok">${p.stock} in stock</span>`;

    return `
        <div class="col-sm-6 col-md-4 col-lg-3">
            <div class="card product-card">
                ${imgHtml}
                <div class="card-body d-flex flex-column gap-1">
                    <span class="badge-category">${p.category || 'Uncategorized'}</span>
                    <h6 class="card-title mb-0 mt-1 fw-semibold">${p.name}</h6>
                    <p class="card-text text-muted small flex-grow-1"
                       style="overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">
                        ${p.description || ''}
                    </p>
                    <div class="d-flex justify-content-between align-items-center mt-1">
                        <span class="price">₱${parseFloat(p.price).toFixed(2)}</span>
                        ${stockBadge}
                    </div>
                </div>
            </div>
        </div>`;
}

function loadCategories() {
    $.get(CAT_URL, function(cats) {
        if (!Array.isArray(cats)) return;
        cats.forEach(cat => {
            if (cat) {
                $('#categoryFilter').append(
                    `<option value="${cat}">${cat}</option>`
                );
            }
        });
    });
}

function fetchPage() {
    if (isLoading || !hasMore) return;
    isLoading = true;
    $('#loadingSpinner').show();

    const params = new URLSearchParams({
        page:  currentPage,
        limit: PAGE_LIMIT
    });
    if (searchQuery)   params.set('search',   searchQuery);
    if (categoryQuery) params.set('category', categoryQuery);

    $.ajax({
        url: `${API_URL}?${params}`,
        method: 'GET',
        success: function(response) {
            const items = Array.isArray(response) ? response : (response.data || []);
            const more  = Array.isArray(response) ? false    : (response.hasMore === true);
            const total = Array.isArray(response) ? items.length : (response.total || items.length);

            if (currentPage === 1) {
                $('#productGrid').empty();
                $('#resultCount').text(`${total} product${total !== 1 ? 's' : ''} found`);
            }

            items.forEach(p => $('#productGrid').append(buildCard(p)));

            hasMore = more;
            if (!hasMore) {
                $('#endMessage').show();
            }

            currentPage++;
            isLoading = false;
            $('#loadingSpinner').hide();
        },
        error: function() {
            isLoading = false;
            $('#loadingSpinner').hide();
        }
    });
}

function resetAndLoad() {
    currentPage = 1;
    hasMore     = true;
    $('#endMessage').hide();
    $('#productGrid').empty();
    $('#resultCount').text('');
    fetchPage();
}

const observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) fetchPage();
}, { rootMargin: '200px' });

observer.observe(document.getElementById('sentinel'));

$('#searchInput').on('input', function() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
        searchQuery = $(this).val().trim();
        resetAndLoad();
    }, 400);
});

$('#categoryFilter').on('change', function() {
    categoryQuery = $(this).val();
    resetAndLoad();
});

loadCategories();
fetchPage();
</script>

</body>
</html>
