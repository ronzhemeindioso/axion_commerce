<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — Aperture</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --ink:#2B2220;
            --muted:#948078;
            --muted-strong:#6B5850;
            --faint:#F0DDD5;
            --line:#F8EFEA;
            --panel:#FFFFFF;
            --canvas:#FEFBF9;
            --accent:#C1745B;
            --accent-dark:#9C5844;
            --accent-soft:#FAEFEA;
            --neutral:#6B7280;
            --neutral-soft:#F1F2F4;
            --violet:#3D1534;
            --cream:#FFF4EB;
            --wheat:#F6E0B6;
            --good:#1EA672;
            --good-soft:#E7F8F1;
            --warn:#C97A1E;
            --warn-soft:#FBF0E1;
            --bad:#D6483F;
            --bad-soft:#FBEBEA;
            --radius:14px;
            --font-serif: 'Playfair Display', serif;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--ink);
            background: var(--canvas);
        }

        .navbar {
            background: var(--panel);
            border-bottom: 1px solid var(--line);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-content {
            max-width: 1180px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }

        .brand {
            font-family: var(--font-serif);
            font-weight: 700;
            font-size: 15px;
            color: var(--ink);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .brand-icon {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--accent-soft);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .brand-icon svg{ width: 13px; height: 13px; }

        .nav-back {
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
            text-decoration: none;
            padding: 8px 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            transition: border-color .15s, color .15s;
        }

        .nav-back:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 800;
            color: var(--ink);
            margin-bottom: 32px;
        }

        .checkout-content {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 32px;
        }

        .checkout-form {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 32px;
        }

        .form-section {
            margin-bottom: 32px;
        }

        .form-section:last-child {
            margin-bottom: 0;
        }

        .form-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--accent);
            border-radius: 2px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select {
            padding: 10px 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--accent);
        }

        .payment-option {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .payment-option input {
            cursor: pointer;
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
        }

        .payment-option label {
            cursor: pointer;
        }

        .order-summary {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 24px;
            height: fit-content;
            position: sticky;
            top: 90px;
        }

        .summary-title {
            font-weight: 700;
            font-size: 16px;
            color: var(--ink);
            margin-bottom: 20px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--line);
            font-size: 13px;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            padding: 16px 0;
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
        }

        .btn-place-order {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            margin-top: 16px;
            transition: background 0.15s;
        }

        .btn-place-order:hover {
            background: var(--accent-dark);
        }

        .btn-place-order:disabled {
            background: var(--neutral-soft);
            cursor: not-allowed;
        }

        .success-message {
            display: none;
            background: var(--good-soft);
            border: 1px solid var(--good);
            color: var(--good);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .error-message {
            display: none;
            background: var(--bad-soft);
            border: 1px solid var(--bad);
            color: var(--bad);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .checkout-content {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .order-summary {
                position: static;
            }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-content">
        <a href="/" class="brand">
            <span class="brand-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="14.31" y1="8" x2="20.05" y2="17.94"/>
                    <line x1="9.69" y1="8" x2="21.17" y2="8"/>
                    <line x1="7.38" y1="12" x2="13.12" y2="2.06"/>
                    <line x1="9.69" y1="16" x2="3.95" y2="6.06"/>
                    <line x1="14.31" y1="16" x2="2.83" y2="16"/>
                    <line x1="16.62" y1="12" x2="10.88" y2="21.94"/>
                </svg>
            </span>
            Axion
        </a>
        <a href="/shop" class="nav-back">← Back to Shop</a>
    </div>
</nav>

<div class="container">
    <h1 class="page-title">Checkout</h1>

    <div class="checkout-content">
        <form class="checkout-form" id="checkoutForm">
            <div class="success-message" id="successMsg">Order placed successfully!</div>
            <div class="error-message" id="errorMsg"></div>

            <!-- Billing Address -->
            <div class="form-section">
                <h2 class="form-title">Billing Address</h2>

                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="firstName" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="lastName" required>
                    </div>
                </div>

                <div class="form-row full">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email" required>
                    </div>
                </div>

                <div class="form-row full">
                    <div class="form-group">
                        <label>Address Line 1</label>
                        <input type="text" id="addressLine1" required>
                    </div>
                </div>

                <div class="form-row full">
                    <div class="form-group">
                        <label>Address Line 2</label>
                        <input type="text" id="addressLine2">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>City / Municipality</label>
                        <input type="text" id="city" required>
                    </div>
                    <div class="form-group">
                        <label>Province / State</label>
                        <input type="text" id="province" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>ZIP / Postal Code</label>
                        <input type="text" id="zipCode" required>
                    </div>
                    <div class="form-group">
                        <label>Country</label>
                        <input type="text" id="country" required>
                    </div>
                </div>

                <div class="form-row full">
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="phone" required>
                    </div>
                </div>
            </div>

            <!-- Payment -->
            <div class="form-section">
                <h2 class="form-title">Payment Method</h2>

                <div class="payment-option">
                    <input type="radio" name="payment" value="card" id="payCard" checked>
                    <label for="payCard">Credit / Debit Card</label>
                </div>
                <div class="payment-option">
                    <input type="radio" name="payment" value="cod" id="payCod">
                    <label for="payCod">Cash on Delivery</label>
                </div>
            </div>
        </form>

        <div class="order-summary">
            <div class="summary-title">Order Summary</div>
            <div id="orderItems">
                <!-- Items loaded by JavaScript -->
            </div>
            <div class="summary-total">
                <span>Total</span>
                <span id="orderTotal">₱0.00</span>
            </div>
            <button class="btn-place-order" id="btnPlaceOrder">Place Order</button>
        </div>
    </div>
</div>

<script>
    let cartItems = [];
    let userData = {};

    async function loadCheckoutData() {
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token || !user.id) {
            alert('Please login first');
            window.location.href = '/login';
            return;
        }

        userData = user;

        // Load basic info immediately from the session
        document.getElementById('firstName').value = user.name?.split(' ')[0] || '';
        document.getElementById('lastName').value = user.name?.split(' ')[1] || '';
        document.getElementById('email').value = user.email || '';

        // Load the rest (phone/shipping address) from the user's saved profile,
        // if they filled it out after registering. Left blank if they haven't.
        try {
            const profileRes = await fetch('/api/auth/profile', {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (profileRes.ok) {
                const profileData = await profileRes.json();
                const profile = profileData.user || {};

                document.getElementById('phone').value = profile.phone || '';
                document.getElementById('addressLine1').value = profile.address_line1 || '';
                document.getElementById('addressLine2').value = profile.address_line2 || '';
                document.getElementById('city').value = profile.city || '';
                document.getElementById('province').value = profile.province || '';
                document.getElementById('zipCode').value = profile.zip_code || '';
                document.getElementById('country').value = profile.country || '';
            }
        } catch (err) {
            console.error('Error loading profile:', err);
        }

        // Load cart
        try {
            const response = await fetch(`/api/cart/${user.id}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            cartItems = await response.json();
            displayOrderSummary();
        } catch (err) {
            console.error('Error loading cart:', err);
        }
    }

    function displayOrderSummary() {
        const itemsDiv = document.getElementById('orderItems');
        itemsDiv.innerHTML = cartItems.map(item => `
            <div class="summary-item">
                <span>${item.name} x${item.quantity}</span>
                <span>₱${(parseFloat(item.price) * item.quantity).toFixed(2)}</span>
            </div>
        `).join('');

        const total = cartItems.reduce((sum, item) => sum + (parseFloat(item.price) * item.quantity), 0);
        document.getElementById('orderTotal').textContent = `₱${total.toFixed(2)}`;
    }

    // Pulls every field out of the form so it actually travels with the order,
    // instead of only sending user_id like before.
    function collectCheckoutPayload() {
        const paymentMethod = document.querySelector('input[name="payment"]:checked').value;

        return {
            user_id: userData.id,
            billing: {
                first_name: document.getElementById('firstName').value.trim(),
                last_name: document.getElementById('lastName').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                address_line1: document.getElementById('addressLine1').value.trim(),
                address_line2: document.getElementById('addressLine2').value.trim(),
                city: document.getElementById('city').value.trim(),
                province: document.getElementById('province').value.trim(),
                zip_code: document.getElementById('zipCode').value.trim(),
                country: document.getElementById('country').value.trim()
            },
            payment_method: paymentMethod
        };
    }

    document.getElementById('btnPlaceOrder').addEventListener('click', async () => {
        const token = localStorage.getItem('token');
        const form = document.getElementById('checkoutForm');

        document.getElementById('successMsg').style.display = 'none';
        document.getElementById('errorMsg').style.display = 'none';

        if (!form.checkValidity()) {
            form.reportValidity();
            return;
        }

        const btn = document.getElementById('btnPlaceOrder');
        const originalLabel = btn.textContent;
        btn.disabled = true;
        btn.textContent = 'Placing order…';

        try {
            const response = await fetch('/api/cart/checkout', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(collectCheckoutPayload())
            });

            const data = await response.json().catch(() => ({}));

            if (response.ok) {
                document.getElementById('successMsg').style.display = 'block';
                setTimeout(() => {
                    window.location.href = `/orders?orderId=${data.order_id}`;
                }, 2000);
            } else {
                document.getElementById('errorMsg').textContent = data.message || 'Checkout failed';
                document.getElementById('errorMsg').style.display = 'block';
                btn.disabled = false;
                btn.textContent = originalLabel;
            }
        } catch (err) {
            document.getElementById('errorMsg').textContent = 'Error placing order';
            document.getElementById('errorMsg').style.display = 'block';
            console.error('Error:', err);
            btn.disabled = false;
            btn.textContent = originalLabel;
        }
    });

    loadCheckoutData();
</script>

</body>
</html>
