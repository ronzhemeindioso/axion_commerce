<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop — Aperture</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --ink:#2B2220;
            --muted:#948078;
            --muted-strong:#6B5850;
            --faint:#F0DDD5;
            --line:#F8EFEA;
            --panel:#FFFFFF;
            --canvas:#FEFBF9;
            --accent:#C1745B;
            --accent-dark:#9C5844;
            --accent-soft:#FAEFEA;
            --neutral:#6B7280;
            --neutral-soft:#F1F2F4;
            --violet:#3D1534;
            --cream:#FFF4EB;
            --wheat:#F6E0B6;
            --good:#1EA672;
            --good-soft:#E7F8F1;
            --warn:#C97A1E;
            --warn-soft:#FBF0E1;
            --bad:#D6483F;
            --bad-soft:#FBEBEA;
            --radius:14px;
            --font-serif: 'Playfair Display', Georgia, serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--ink);
            background: var(--canvas);
        }

        /* ── Access denied banner ────────────────────────── */
        #accessDeniedBanner {
            display: none;
            background: var(--bad-soft);
            color: var(--bad);
            border-bottom: 1px solid var(--bad);
            padding: 12px 24px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            position: relative;
        }
        #accessDeniedBanner.show { display: block; }
        #accessDeniedBanner .close-banner {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--bad);
            font-size: 16px;
            cursor: pointer;
            line-height: 1;
        }

        /* ── Toasts ────────────────────────── */
        #toastHost {
            position: fixed;
            top: 90px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            min-width: 240px;
            max-width: 320px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-left: 4px solid var(--accent);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            animation: toast-in .2s ease-out;
        }
        .toast.success { border-left-color: var(--good); }
        .toast.warning { border-left-color: var(--warn); }
        .toast.danger  { border-left-color: var(--bad); }
        .toast button {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
        }
        @keyframes toast-in {
            from { opacity: 0; transform: translateX(16px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* ── Navigation ────────────────────────── */
        .navbar {
            background: var(--panel);
            border-bottom: 1px solid var(--line);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-content {
            max-width: 1180px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }

        .brand {
            font-family: var(--font-serif);
            font-weight: 700;
            font-size: 15px;
            color: var(--ink);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .brand-icon {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--accent-soft);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .brand-icon svg{ width: 13px; height: 13px; }

        .nav-menu {
            display: flex;
            gap: 4px;
            list-style: none;
        }

        .nav-menu a {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: var(--muted-strong);
            font-weight: 500;
            font-size: 13.5px;
            padding: 8px 16px;
            border-radius: 9px;
            position: relative;
            transition: color 0.15s;
        }

        .nav-menu a:hover { color: var(--accent); }

        .nav-menu a.active{
            color: var(--accent);
            font-weight: 600;
        }
        .nav-menu a.active::after{
            content: "";
            position: absolute;
            left: 16px;
            right: 16px;
            bottom: 2px;
            height: 2px;
            border-radius: 2px;
            background: var(--accent);
        }

        .nav-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .nav-link-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: var(--muted);
            padding: 8px 14px;
            border-radius: 9px;
            font-size: 13.5px;
            font-weight: 500;
            position: relative;
            transition: color .15s ease, background .15s ease;
        }
        .nav-link-item:hover {
            color: var(--accent);
            background: var(--accent-soft);
        }
        .nav-link-item .cart-badge {
            position: static;
            margin-left: 2px;
        }

        /* ── Admin top nav (mirrors products.html exactly) ────────── */
        .admin-topnav{
            background: var(--panel);
            border-bottom: 1px solid var(--line);
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .admin-topnav-inner{
            max-width: 1180px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }
        .admin-brand{
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            font-size: 15px;
            letter-spacing: -0.01em;
            color: var(--ink);
        }
        .admin-brand-icon{
            width: 22px; height: 22px;
            border-radius: 50%;
            background: var(--accent-soft);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 12px;
        }
        .admin-brand-icon svg{ width: 13px; height: 13px; }
        .admin-topnav-links{ display: flex; gap: 4px; }
        .admin-topnav-links a{
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: var(--muted);
            padding: 8px 14px;
            border-radius: 9px;
            font-size: 13.5px;
            font-weight: 500;
            position: relative;
            transition: color .15s ease;
        }
        .admin-topnav-links a:hover{ color: var(--accent); }
        .admin-topnav-links a.active{
            color: var(--accent);
            font-weight: 600;
        }
        .admin-topnav-links a.active::after{
            content: "";
            position: absolute;
            left: 14px;
            right: 14px;
            bottom: 2px;
            height: 2px;
            border-radius: 2px;
            background: var(--accent);
        }
        #adminLogoutBtn{ color: var(--bad); }
        #adminLogoutBtn:hover{ color: #B93A32; }

        .nav-user {
            font-size: 13px;
            font-weight: 600;
            color: var(--muted-strong);
            margin-right: 4px;
            white-space: nowrap;
        }

        .btn-icon {
            width: 34px;
            height: 34px;
            border: 1px solid var(--line);
            background: var(--panel);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            transition: all 0.15s;
            text-decoration: none;
            color: var(--ink);
            position: relative;
        }

        .btn-icon:hover {
            background: var(--accent-soft);
            border-color: var(--faint);
        }

        .btn-nav {
            border: 1px solid var(--line);
            background: var(--panel);
            border-radius: 8px;
            padding: 0 14px;
            height: 36px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            color: var(--ink);
        }
        .btn-nav-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .btn-nav-primary:hover { background: var(--accent-dark); }
        .btn-nav-outline:hover { background: var(--accent-soft); border-color: var(--faint); }
        .btn-nav-danger { color: var(--bad); border-color: var(--faint); }
        .btn-nav-danger:hover { background: var(--bad-soft); border-color: var(--bad); }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--bad);
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
        }

        /* ── Main Content ────────────────────────── */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* ── Main Products Area ────────────────────────── */
        .main {
            display: flex;
            flex-direction: column;
        }

        .search-row {
            margin-bottom: 16px;
        }

        .search-input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid var(--line);
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            color: var(--ink);
            outline: none;
            transition: border-color .15s;
        }
        .search-input:focus { border-color: var(--accent); }
        .search-input::placeholder { color: var(--muted); }

        /* ── Filter row (category dropdown + price) ────────────────────────── */
        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
        }

        .category-select {
            padding: 9px 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            background: var(--panel);
            color: var(--ink);
            cursor: pointer;
            outline: none;
            min-width: 160px;
        }
        .category-select:focus { border-color: var(--accent); }

        .price-range {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .price-range input {
            width: 80px;
            padding: 8px 10px;
            border: 1px solid var(--line);
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            color: var(--ink);
            outline: none;
        }
        .price-range input:focus { border-color: var(--accent); }
        .price-range span { color: var(--muted); font-size: 13px; }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--line);
        }

        .topbar-left {
            font-size: 13px;
            color: var(--muted);
        }

        .topbar-right {
            display: flex;
            gap: 12px;
        }

        .sort-select {
            padding: 8px 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            font-size: 13px;
            background: var(--panel);
            color: var(--ink);
            cursor: pointer;
            outline: none;
        }

        .sort-select:focus {
            border-color: var(--accent);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
            font-size: 14px;
        }

        .product-card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            overflow: hidden;
            transition: all 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            border-color: var(--faint);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            transform: translateY(-4px);
        }

        .product-image {
            width: 100%;
            height: 200px;
            background: var(--neutral-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: var(--muted);
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 16px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .product-category {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--accent);
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .product-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-rating {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
            font-size: 12px;
        }

        .stars {
            color: var(--warn);
        }

        .rating-count {
            color: var(--muted);
            font-size: 11px;
        }

        .product-bottom {
            margin-top: auto;
        }

        .product-price-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .product-price {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
        }

        .stock-low {
            color: var(--bad);
            font-size: 11px;
            font-weight: 600;
        }
        .stock-ok {
            color: var(--muted);
            font-size: 11px;
        }

        .btn-add-cart {
            width: 100%;
            background: var(--accent-soft);
            color: var(--accent);
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-add-cart:hover {
            background: var(--accent);
            color: white;
        }

        .btn-add-cart:disabled {
            background: var(--neutral-soft);
            color: var(--muted);
            cursor: not-allowed;
        }

        /* ── Infinite scroll status / sentinel ────────────────────────── */
        .infinite-status {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 32px;
            min-height: 30px;
            font-size: 13px;
            color: var(--muted);
        }

        .infinite-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--faint);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: infinite-spin 0.7s linear infinite;
        }

        @keyframes infinite-spin {
            to { transform: rotate(360deg); }
        }

        #scrollSentinel {
            height: 1px;
        }

        .profile-dropdown {
            position: relative;
        }
        .dropdown-menu {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 12px;
            box-shadow: 0 12px 32px rgba(43,34,32,.14);
            min-width: 190px;
            padding: 6px;
            display: none;
            flex-direction: column;
            gap: 2px;
            z-index: 200;
        }
        .dropdown-menu.open {
            display: flex;
        }
        .dropdown-user {
            padding: 10px 12px 8px;
            font-size: 12.5px;
            font-weight: 700;
            color: var(--muted-strong);
            border-bottom: 1px solid var(--line);
            margin-bottom: 4px;
        }
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 8px;
            font-size: 13.5px;
            font-weight: 500;
            color: var(--ink);
            text-decoration: none;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            cursor: pointer;
            font-family: inherit;
        }
        .dropdown-item:hover {
            background: var(--accent-soft);
            color: var(--accent);
        }
        .dropdown-item svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
        }
        .dropdown-item-danger {
            color: var(--bad);
        }
        .dropdown-item-danger:hover {
            background: var(--bad-soft);
            color: var(--bad);
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }

            .topbar {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .nav-user { display: none; }
        }
    </style>
</head>
<body>

<!-- Access denied banner: runs before anything else so it can never be skipped -->
<div id="accessDeniedBanner">
    <span id="accessDeniedText">You cannot access this page.</span>
    <button class="close-banner" onclick="document.getElementById('accessDeniedBanner').classList.remove('show')" aria-label="Close">✕</button>
</div>
<script>
    (function () {
        var deniedMsg = sessionStorage.getItem('accessDeniedMessage');
        if (deniedMsg) {
            sessionStorage.removeItem('accessDeniedMessage');
            document.getElementById('accessDeniedText').textContent = deniedMsg;
            document.getElementById('accessDeniedBanner').classList.add('show');
        }
    })();
</script>

<div id="toastHost"></div>

<!-- Storefront Navigation (customers & guests) -->

        <a href="/" class="brand">
            <span class="brand-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                    <line x1="9.69" y1="8" x2="21.17" y2="8"/>
                    <line x1="7.38" y1="12" x2="13.12" y2="2.06"/>
                    <line x1="9.69" y1="16" x2="3.95" y2="6.06"/>
                    <line x1="14.31" y1="16" x2="2.83" y2="16"/>
                    <line x1="16.62" y1="12" x2="10.88" y2="21.94"/>
                </svg>
            </span>
            Axion
        </a>
        <ul class="nav-menu">
            <li><a href="/">Home</a></li>
            <li><a href="/#about">About</a></li>

            <li><a href="/#contact">Contact</a></li>
        </ul>
        <div class="nav-actions">
            <a href="/cart" id="navCartLink" class="btn-icon" style="position: relative;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">

            <div class="profile-dropdown" id="profileDropdown">

                    <a href="/profile-orders" id="navOrdersLink" class="dropdown-item" style="display:none;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/>
                            <path d="M3.3 7 12 12l8.7-5"/>
                            <path d="M12 22V12"/>
                        </svg>
                        My Orders
                    </a>

                    <a href="/edit-profile" id="navProfileLink" class="dropdown-item" style="display:none;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        Edit Profile
                    </a>

                    <a href="/login" id="navLoginLink" class="dropdown-item">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                            <polyline points="10 17 15 12 10 7"/>
                            <line x1="15" y1="12" x2="3" y2="12"/>
                        </svg>
                        Login
                    </a>

                    <button type="button" id="navLogoutBtn" class="dropdown-item dropdown-item-danger" style="display:none;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- Admin Navigation (mirrors products.html topnav exactly, with Shop added as the active link) -->
<div class="admin-topnav" id="adminTopNav" style="display:none;">
    <div class="admin-topnav-inner">
        <div class="admin-brand">
        <span class="admin-brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="14.31" y1="8" x2="20.05" y2="17.94"/>
                <line x1="9.69" y1="8" x2="21.17" y2="8"/>
                <line x1="7.38" y1="12" x2="13.12" y2="2.06"/>
                <line x1="9.69" y1="16" x2="3.95" y2="6.06"/>
                <line x1="14.31" y1="16" x2="2.83" y2="16"/>
                <line x1="16.62" y1="12" x2="10.88" y2="21.94"/>
            </svg>
        </span>
        Store Admin
    </div>
        <div class="admin-topnav-links">
            <a href="/charts">Home</a>
            <a href="/users">Users</a>
            <a href="/orders">Orders</a>
            <a href="/products">Products</a>
            <a href="/shop" class="active">Reviews</a>
            <a href="#" id="adminLogoutBtn">Logout</a>
        </div>
    </div>
</div>


<!-- Main Content -->
<div class="container">
    <!-- Products -->
    <main class="main">
        <div class="search-row">
            <input type="text" id="searchInput" class="search-input" placeholder="Search products…">
        </div>

        <div class="filter-row">
            <select class="category-select" id="categoryFilter">
                <option value="">All categories</option>
                <!-- Options loaded by JavaScript -->
            </select>
            <div class="price-range">
                <input type="number" id="minPrice" placeholder="Min" min="0">
                <span>—</span>
                <input type="number" id="maxPrice" placeholder="Max" min="0">
            </div>
        </div>

        <div class="topbar">
            <div class="topbar-left" id="productCount">Showing 0 products</div>
            <div class="topbar-right">
                <select class="sort-select" id="sortSelect">
                    <option value="newest">Newest</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                    <option value="name">Name: A to Z</option>
                </select>
            </div>
        </div>

        <div class="products-grid" id="productsGrid">
            <!-- Products loaded by JavaScript -->
        </div>

        <!-- Infinite scroll: sentinel is observed, status shows spinner / end-of-list message -->
        <div id="scrollSentinel"></div>
        <div class="infinite-status" id="infiniteStatus"></div>
    </main>
</div>

<script>
const API_URL     = '/api/products';
const CART_URL    = '/api/cart';
const UPLOADS_URL = '/uploads/';
const BATCH_SIZE  = 10;

let allProducts       = [];
let filteredProducts  = [];
let renderedCount     = 0;
let isLoadingBatch    = false;
let searchQuery       = '';
let searchTimer       = null;
const productCache    = {};

// ---------- Auth helpers ----------
function getToken() { return localStorage.getItem('token'); }
function getUser()  { try { return JSON.parse(localStorage.getItem('user') || 'null'); } catch (e) { return null; } }
function isAdmin()  { const u = getUser(); return !!(getToken() && u && u.role === 'admin'); }

function refreshNav() {
    const token = getToken();
    const user  = getUser();
    const loggedIn = !!(token && user);
    const admin = loggedIn && user.role === 'admin';

    // Admins get the Store Admin topnav (mirrors products.html); everyone
    // else gets the storefront nav with shopping links.
    document.getElementById('storefrontNav').style.display = admin ? 'none' : 'block';
    document.getElementById('adminTopNav').style.display   = admin ? 'block' : 'none';

    if (admin) return;

    document.getElementById('navLoginLink').style.display   = loggedIn ? 'none' : 'inline-flex';
    document.getElementById('navLogoutBtn').style.display   = loggedIn ? 'inline-flex' : 'none';
    document.getElementById('navProfileLink').style.display = loggedIn ? 'flex' : 'none';
    document.getElementById('navOrdersLink').style.display  = loggedIn ? 'flex' : 'none';
    document.getElementById('navCartLink').style.display    = 'inline-flex';

    const navUser = document.getElementById('navUser');
    if (loggedIn) {
        navUser.style.display = 'inline';
        navUser.textContent = 'Hi, ' + user.name;
    } else {
        navUser.style.display = 'none';
        navUser.textContent = '';
    }
}

function logoutUser() {
    const token = getToken();
    fetch('/api/auth/logout', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token }
    }).catch(() => {}).finally(() => {
        // Clear locally regardless of server response, so a stale/expired
        // token can never leave the user stuck in a "logged in" UI.
        clearSession();
        window.location.href = '/login';
    });
}

function clearSession() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    refreshNav();
}

document.getElementById('navLogoutBtn').addEventListener('click', logoutUser);

document.getElementById('profileDropdownToggle').addEventListener('click', function (e) {
    e.stopPropagation();
    document.getElementById('profileDropdownMenu').classList.toggle('open');
});

document.addEventListener('click', function (e) {
    const menu = document.getElementById('profileDropdownMenu');
    const toggle = document.getElementById('profileDropdownToggle');
    if (menu.classList.contains('open') && !menu.contains(e.target) && !toggle.contains(e.target)) {
        menu.classList.remove('open');
    }
});

document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
        document.getElementById('profileDropdownMenu').classList.remove('open');
    }
});
document.getElementById('adminLogoutBtn').addEventListener('click', function (e) {
    e.preventDefault();
    logoutUser();
});

// ---------- Toasts ----------
function showToast(message, variant) {
    const host = document.getElementById('toastHost');
    const el = document.createElement('div');
    el.className = 'toast ' + (variant || '');
    el.innerHTML = `<span>${message}</span><button aria-label="Close">✕</button>`;
    host.appendChild(el);

    const remove = () => { if (el.parentNode) el.parentNode.removeChild(el); };
    el.querySelector('button').addEventListener('click', remove);
    setTimeout(remove, 2500);
}

// ---------- Cart ----------
function updateCartCount() {
    const token = getToken();
    const user  = getUser();
    const badge = document.getElementById('cartCount');

    if (!token || !user) {
        badge.style.display = 'none';
        badge.textContent = '0';
        return;
    }

    fetch(CART_URL + '/' + user.id, {
        headers: { 'Authorization': 'Bearer ' + token }
    })
        .then(res => {
            if (res.status === 401) {
                clearSession();
                return [];
            }
            return res.ok ? res.json() : [];
        })
        .then(items => {
            const count = Array.isArray(items) ? items.reduce((sum, i) => sum + (i.quantity || 0), 0) : 0;
            if (count > 0) {
                badge.textContent = count;
                badge.style.display = 'flex';
            } else {
                badge.style.display = 'none';
                badge.textContent = '0';
            }
        })
        .catch(() => {});
}

function addToCart(event, productId) {
    event.stopPropagation();

    const token   = getToken();
    const user    = getUser();
    const product = productCache[productId];
    const btn     = event.currentTarget;

    if (!token || !user) {
        showToast('Please log in to add items to your cart.', 'warning');
        window.location.href = '/login';
        return;
    }

    if (!product) return;

    const original = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Adding…';

    fetch(CART_URL, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({
            user_id: user.id,
            product_id: product.id,
            name: product.name,
            description: product.description,
            price: product.price,
            quantity: 1,
            images: product.images
        })
    })
        .then(async res => {
            if (res.status === 401) {
                clearSession();
                showToast('Your session has expired. Please log in again.', 'warning');
                window.location.href = '/login';
                return;
            }
            if (!res.ok) {
                const body = await res.json().catch(() => ({}));
                showToast(body.message || body.error || 'Could not add to cart.', 'danger');
                return;
            }
            showToast(`Added "${product.name}" to your cart.`, 'success');
            updateCartCount();
        })
        .catch(() => showToast('Could not add to cart.', 'danger'))
        .finally(() => {
            btn.disabled = false;
            btn.textContent = original;
        });
}

// ---------- Products ----------
async function loadAllProducts() {
    try {
        const response = await fetch(`${API_URL}?page=1&limit=1000`);
        const data = await response.json();
        allProducts = data.data || [];
        allProducts.forEach(p => { productCache[p.id] = p; });
        populateFilters();
        applyFilters();
    } catch (err) {
        console.error('Error loading products:', err);
    }
}

function populateFilters() {
    const categories = [...new Set(allProducts.map(p => p.category).filter(Boolean))];
    const categoryFilter = document.getElementById('categoryFilter');

    categories.forEach(cat => {
        categoryFilter.innerHTML += `<option value="${cat}">${cat}</option>`;
    });
}

// Re-applies filters/search/sort, then resets the infinite-scroll list back
// to the top and renders the first batch.
function applyFilters() {
    const selectedCategory = document.getElementById('categoryFilter').value;
    const minPrice = parseFloat(document.getElementById('minPrice').value) || 0;
    const maxPrice = parseFloat(document.getElementById('maxPrice').value) || Infinity;
    const q = searchQuery.trim().toLowerCase();

    filteredProducts = allProducts.filter(product => {
        const categoryMatch = !selectedCategory || product.category === selectedCategory;
        const priceMatch = product.price >= minPrice && product.price <= maxPrice;

        const searchMatch = !q ||
            (product.name && product.name.toLowerCase().includes(q)) ||
            (product.description && product.description.toLowerCase().includes(q)) ||
            (product.category && product.category.toLowerCase().includes(q));

        return categoryMatch && priceMatch && searchMatch;
    });

    sortProducts();
    resetAndRenderProducts();
}

function sortProducts() {
    const sortBy = document.getElementById('sortSelect').value;

    filteredProducts.sort((a, b) => {
        switch (sortBy) {
            case 'price-low':  return a.price - b.price;
            case 'price-high': return b.price - a.price;
            case 'name':       return a.name.localeCompare(b.name);
            case 'newest':
            default:           return b.id - a.id;
        }
    });
}

// Clears the grid and renders the first batch — called whenever the
// filter/search/sort criteria change.
function resetAndRenderProducts() {
    renderedCount = 0;
    document.getElementById('productsGrid').innerHTML = '';

    if (filteredProducts.length === 0) {
        document.getElementById('productsGrid').innerHTML =
            `<div class="empty-state">No products match your filters.</div>`;
        document.getElementById('productCount').textContent = 'Showing 0 products';
        document.getElementById('infiniteStatus').innerHTML = '';
        return;
    }

    renderNextBatch();
}

function buildProductCard(product) {
    const outOfStock = product.stock <= 0;
    const stockBadge = outOfStock
        ? `<span class="stock-low">Out of stock</span>`
        : product.stock <= 5
            ? `<span class="stock-low">Only ${product.stock} left!</span>`
            : `<span class="stock-ok">${product.stock} in stock</span>`;

    const actionButton = isAdmin()
        ? ''
        : `<button class="btn-add-cart" ${outOfStock ? 'disabled' : ''} onclick="addToCart(event, ${product.id})">
                ${outOfStock ? 'Out of stock' : 'Add to Cart'}
           </button>`;

    return `
    <div class="product-card" onclick="window.location.href='product-detail.html?id=${product.id}'">
        <div class="product-image">
            ${product.images ? `<img src="${UPLOADS_URL}${product.images.split(',')[0]}" alt="${product.name}" loading="lazy">` : '📷'}
        </div>
        <div class="product-info">
            <div class="product-category">${product.category || 'Uncategorized'}</div>
            <div class="product-name">${product.name}</div>
            <div class="product-rating">
                <span class="stars">★★★★★</span>
                <span class="rating-count">(48)</span>
            </div>
            <div class="product-bottom">
                <div class="product-price-row">
                    <span class="product-price">₱${parseFloat(product.price).toFixed(2)}</span>
                    ${stockBadge}
                </div>
                ${actionButton}
            </div>
        </div>
    </div>`;
}

// Appends the next BATCH_SIZE products to the grid. Guarded against
// concurrent calls (isLoadingBatch) and against loading past the end.
function renderNextBatch() {
    if (isLoadingBatch) return;
    if (renderedCount >= filteredProducts.length) {
        updateInfiniteStatus();
        return;
    }

    isLoadingBatch = true;
    updateInfiniteStatus();

    // Small delay so the "Loading more…" state is perceptible even on a
    // fast local API — mirrors how a real paginated fetch would feel.
    setTimeout(() => {
        const start = renderedCount;
        const end = Math.min(start + BATCH_SIZE, filteredProducts.length);
        const nextItems = filteredProducts.slice(start, end);

        const grid = document.getElementById('productsGrid');
        grid.insertAdjacentHTML('beforeend', nextItems.map(buildProductCard).join(''));

        renderedCount = end;
        isLoadingBatch = false;

        document.getElementById('productCount').textContent =
            `Showing ${renderedCount} of ${filteredProducts.length} products`;

        updateInfiniteStatus();

        // The sentinel only fires again when its visibility CHANGES. If the
        // page is short enough that the sentinel never actually leaves the
        // viewport, it would otherwise get stuck after the first batch.
        // Forcing a fresh observe() re-checks its current position and, if
        // it's still on screen, immediately queues the next batch.
        recheckSentinel();
    }, 200);
}

function recheckSentinel() {
    const sentinel = document.getElementById('scrollSentinel');
    scrollObserver.unobserve(sentinel);
    scrollObserver.observe(sentinel);
}

function updateInfiniteStatus() {
    const status = document.getElementById('infiniteStatus');

    if (isLoadingBatch) {
        status.innerHTML = `<span class="infinite-spinner"></span> Loading more products…`;
    } else if (filteredProducts.length > 0 && renderedCount >= filteredProducts.length) {
        status.innerHTML = `You've reached the end of the list.`;
    } else {
        status.innerHTML = '';
    }
}

// ---------- Infinite scroll trigger ----------
// Watches a 1px sentinel below the grid; once it scrolls into view, the
// next batch loads automatically — no click, no page numbers.
const scrollObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            renderNextBatch();
        }
    });
}, {
    root: null,
    rootMargin: '200px', // start loading a bit before the sentinel is actually on screen
    threshold: 0
});
scrollObserver.observe(document.getElementById('scrollSentinel'));

// ---------- Event wiring ----------
document.getElementById('categoryFilter').addEventListener('change', applyFilters);
document.getElementById('minPrice').addEventListener('change', applyFilters);
document.getElementById('maxPrice').addEventListener('change', applyFilters);
document.getElementById('sortSelect').addEventListener('change', applyFilters);

document.getElementById('searchInput').addEventListener('input', function () {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
        searchQuery = this.value;
        applyFilters();
    }, 400);
});

refreshNav();
updateCartCount();
loadAllProducts();

// If arriving from a homepage search (e.g. /shop?search=lens), prefill the search box
(function prefillSearchFromURL() {
    const params = new URLSearchParams(window.location.search);
    const q = params.get('search');
    if (q) {
        document.getElementById('searchInput').value = q;
        searchQuery = q;
        applyFilters();
    }
})();
</script>

</body>
