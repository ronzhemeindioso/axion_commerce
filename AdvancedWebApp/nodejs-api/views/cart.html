<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart — Aperture</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --ink:#2B2220;
            --muted:#948078;
            --muted-strong:#6B5850;
            --faint:#F0DDD5;
            --line:#F8EFEA;
            --panel:#FFFFFF;
            --canvas:#FEFBF9;
            --accent:#C1745B;
            --accent-dark:#9C5844;
            --accent-soft:#FAEFEA;
            --neutral:#6B7280;
            --neutral-soft:#F1F2F4;
            --violet:#3D1534;
            --cream:#FFF4EB;
            --wheat:#F6E0B6;
            --good:#1EA672;
            --good-soft:#E7F8F1;
            --warn:#C97A1E;
            --warn-soft:#FBF0E1;
            --bad:#D6483F;
            --bad-soft:#FBEBEA;
            --radius:14px;
            --font-serif: 'Playfair Display', serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--ink);
            background: var(--canvas);
        }

        /* ── Toasts ────────────────────────── */
        #toastHost {
            position: fixed;
            top: 90px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            min-width: 240px;
            max-width: 320px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-left: 4px solid var(--accent);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            animation: toast-in .2s ease-out;
        }
        .toast.success { border-left-color: var(--good); }
        .toast.warning { border-left-color: var(--warn); }
        .toast.danger  { border-left-color: var(--bad); }
        .toast button {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
        }
        @keyframes toast-in {
            from { opacity: 0; transform: translateX(16px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .navbar {
            background: var(--panel);
            border-bottom: 1px solid var(--line);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-content {
            max-width: 1180px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }

        .brand {
            font-family: var(--font-serif);
            font-weight: 700;
            font-size: 15px;
            color: var(--ink);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .brand-icon {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--accent-soft);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .brand-icon svg{ width: 13px; height: 13px; }

        .nav-menu {
            display: flex;
            gap: 4px;
            list-style: none;
        }

        .nav-menu a {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: var(--muted-strong);
            font-weight: 500;
            font-size: 13.5px;
            padding: 8px 16px;
            border-radius: 9px;
            position: relative;
            transition: color 0.15s;
        }

        .nav-menu a:hover { color: var(--accent); }

        .nav-menu a.active{
            color: var(--accent);
            font-weight: 600;
        }
        .nav-menu a.active::after{
            content: "";
            position: absolute;
            left: 16px;
            right: 16px;
            bottom: 2px;
            height: 2px;
            border-radius: 2px;
            background: var(--accent);
        }

        .nav-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* ── Admin top nav (mirrors products.html exactly) ────────── */
        .admin-topnav{
            background: var(--panel);
            border-bottom: 1px solid var(--line);
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .admin-topnav-inner{
            max-width: 1180px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }
        .admin-brand{
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            font-size: 15px;
            letter-spacing: -0.01em;
            color: var(--ink);
        }
        .admin-brand-icon{
            width: 22px; height: 22px;
            border-radius: 50%;
            background: var(--accent-soft);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 12px;
        }
        .admin-brand-icon svg{ width: 13px; height: 13px; }
        .admin-topnav-links{ display: flex; gap: 4px; }
        .admin-topnav-links a{
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: var(--muted);
            padding: 8px 14px;
            border-radius: 9px;
            font-size: 13.5px;
            font-weight: 500;
            position: relative;
            transition: color .15s ease;
        }
        .admin-topnav-links a:hover{ color: var(--accent); }
        .admin-topnav-links a.active{
            color: var(--accent);
            font-weight: 600;
        }
        .admin-topnav-links a.active::after{
            content: "";
            position: absolute;
            left: 14px;
            right: 14px;
            bottom: 2px;
            height: 2px;
            border-radius: 2px;
            background: var(--accent);
        }
        #adminLogoutBtn{ color: var(--bad); }
        #adminLogoutBtn:hover{ color: #B93A32; }

        .btn-icon {
            width: 34px;
            height: 34px;
            border: 1px solid var(--line);
            background: var(--panel);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            transition: all 0.15s;
            text-decoration: none;
            color: var(--ink);
            position: relative;
        }

        .btn-icon:hover {
            background: var(--accent-soft);
            border-color: var(--faint);
        }

        .profile-dropdown {
            position: relative;
        }
        .dropdown-menu {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 12px;
            box-shadow: 0 12px 32px rgba(43,34,32,.14);
            min-width: 190px;
            padding: 6px;
            display: none;
            flex-direction: column;
            gap: 2px;
            z-index: 200;
        }
        .dropdown-menu.open {
            display: flex;
        }
        .dropdown-user {
            padding: 10px 12px 8px;
            font-size: 12.5px;
            font-weight: 700;
            color: var(--muted-strong);
            border-bottom: 1px solid var(--line);
            margin-bottom: 4px;
        }
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 8px;
            font-size: 13.5px;
            font-weight: 500;
            color: var(--ink);
            text-decoration: none;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            cursor: pointer;
            font-family: inherit;
        }
        .dropdown-item:hover {
            background: var(--accent-soft);
            color: var(--accent);
        }
        .dropdown-item svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
        }
        .dropdown-item-danger {
            color: var(--bad);
        }
        .dropdown-item-danger:hover {
            background: var(--bad-soft);
            color: var(--bad);
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--bad);
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 800;
            color: var(--ink);
            margin-bottom: 32px;
        }

        .cart-content {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 32px;
        }

        .cart-items {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .cart-item {
            display: grid;
            grid-template-columns: 100px 1fr 100px 140px 50px;
            gap: 20px;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--line);
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .item-image {
            width: 100px;
            height: 100px;
            background: var(--neutral-soft);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-info h3 {
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 4px;
        }

        .item-info p {
            font-size: 13px;
            color: var(--muted);
        }

        .item-price {
            font-weight: 700;
            color: var(--accent);
        }

        .quantity-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .quantity-btn {
            width: 28px;
            height: 28px;
            border: 1px solid var(--line);
            background: var(--panel);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            color: var(--ink);
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .quantity-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .quantity-btn:disabled {
            cursor: not-allowed;
            opacity: .4;
        }

        .quantity-input {
            width: 44px;
            padding: 6px 4px;
            border: 1px solid var(--line);
            border-radius: 6px;
            text-align: center;
            font-weight: 600;
            font-family: inherit;
        }

        .btn-remove {
            background: var(--bad-soft);
            color: var(--bad);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.15s;
        }

        .btn-remove:hover {
            background: var(--bad);
            color: white;
        }

        .empty-cart {
            padding: 60px 40px;
            text-align: center;
        }

        .empty-cart-icon {
            display: flex;
            justify-content: center;
            margin-bottom: 16px;
            color: var(--muted);
        }

        .empty-cart p {
            color: var(--muted);
            margin-bottom: 24px;
        }

        .btn-continue-shopping {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn-continue-shopping:hover {
            background: var(--accent-dark);
        }

        .cart-summary {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 24px;
            height: fit-content;
            position: sticky;
            top: 90px;
        }

        .summary-title {
            font-weight: 700;
            font-size: 16px;
            color: var(--ink);
            margin-bottom: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--line);
            font-size: 14px;
        }

        .summary-row.total {
            border: none;
            padding: 16px 0;
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
        }

        .btn-checkout {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            margin-top: 16px;
            transition: background 0.15s;
        }

        .btn-checkout:hover {
            background: var(--accent-dark);
        }

        .btn-checkout:disabled {
            background: var(--neutral-soft);
            color: var(--muted);
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .cart-content {
                grid-template-columns: 1fr;
            }

            .cart-item {
                grid-template-columns: 80px 1fr;
                gap: 12px;
            }

            .item-image {
                width: 80px;
                height: 80px;
                grid-column: 1;
                grid-row: 1 / 3;
            }

            .item-price,
            .quantity-group,
            .btn-remove {
                display: none;
            }

            .cart-summary {
                position: static;
            }

            .nav-menu { display: none; }
        }

        /* ── Confirm modal (replaces browser confirm()) ── */
        .confirm-overlay {
            position: fixed;
            inset: 0;
            background: rgba(43,34,32,.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 500;
        }
        .confirm-overlay.show { display: flex; }

        .confirm-card {
            background: var(--panel);
            border-radius: var(--radius);
            padding: 28px 28px 20px;
            width: 360px;
            max-width: calc(100vw - 48px);
            box-shadow: 0 20px 48px rgba(43,34,32,.25);
            text-align: center;
        }

        .confirm-card p {
            font-size: 15px;
            color: var(--ink);
            margin-bottom: 24px;
        }

        .confirm-actions {
            display: flex;
            gap: 10px;
        }

        .confirm-btn {
            flex: 1;
            padding: 11px 16px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid var(--line);
            transition: background .15s, border-color .15s;
        }

        .confirm-btn-cancel {
            background: var(--panel);
            color: var(--ink);
        }
        .confirm-btn-cancel:hover { background: var(--canvas); }

        .confirm-btn-danger {
            background: var(--bad);
            border-color: var(--bad);
            color: #fff;
        }
        .confirm-btn-danger:hover { background: #b73a32; }
    </style>
</head>
<body>
    <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-card">
        <p id="confirmMessage">Are you sure?</p>
        <div class="confirm-actions">
            <button class="confirm-btn confirm-btn-cancel" id="confirmCancelBtn">Cancel</button>
            <button class="confirm-btn confirm-btn-danger" id="confirmOkBtn">Remove</button>
        </div>
    </div>
</div>

            <!-- Cart items loaded by JavaScript -->
        </div>

            <div class="summary-row">
                <span>Subtotal</span>

            </div>

                <span>Shipping</span>
                <span>₱0.00</span>
            </div>
            <div class="summary-row">
                <span>Tax</span>
                <span>₱0.00</span>
            </div>

            </div>

        </div>

<script>
const CART_URL    = '/api/cart';
const UPLOADS_URL = '/uploads/';

let cartItems = [];

function getToken() { return localStorage.getItem('token'); }
function getUser()  { try { return JSON.parse(localStorage.getItem('user') || 'null'); } catch (e) { return null; } }

// A cart requires a logged-in user, so bounce out immediately if there's no session.
const token = getToken();
const user  = getUser();
if (!token || !user || !user.id) {
    window.location.href = '/login';
}

// ---------- Nav / auth state ----------
function refreshNav() {
    const loggedIn = !!(token && user);
    const admin = loggedIn && user.role === 'admin';

    document.getElementById('storefrontNav').style.display = admin ? 'none' : 'block';
    document.getElementById('adminTopNav').style.display   = admin ? 'block' : 'none';

    if (admin) return;

    document.getElementById('navLoginLink').style.display   = loggedIn ? 'none' : 'inline-flex';
    document.getElementById('navLogoutBtn').style.display   = loggedIn ? 'inline-flex' : 'none';
    document.getElementById('navProfileLink').style.display = loggedIn ? 'flex' : 'none';
    document.getElementById('navOrdersLink').style.display  = loggedIn ? 'flex' : 'none';

    const navUser = document.getElementById('navUser');
    if (loggedIn) {
        navUser.style.display = 'inline';
        navUser.textContent = 'Hi, ' + user.name;
    } else {
        navUser.style.display = 'none';
        navUser.textContent = '';
    }
}

function showConfirm(message) {
    return new Promise((resolve) => {
        const overlay = document.getElementById('confirmOverlay');
        document.getElementById('confirmMessage').textContent = message;
        overlay.classList.add('show');

        const okBtn = document.getElementById('confirmOkBtn');
        const cancelBtn = document.getElementById('confirmCancelBtn');

        function cleanup(result) {
            overlay.classList.remove('show');
            okBtn.removeEventListener('click', onOk);
            cancelBtn.removeEventListener('click', onCancel);
            resolve(result);
        }
        function onOk() { cleanup(true); }
        function onCancel() { cleanup(false); }

        okBtn.addEventListener('click', onOk);
        cancelBtn.addEventListener('click', onCancel);
    });
}

function clearSession() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
}

function logoutUser() {
    fetch('/api/auth/logout', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token }
    }).catch(() => {}).finally(() => {
        clearSession();
        window.location.href = '/login';
    });
}

document.getElementById('navLogoutBtn').addEventListener('click', logoutUser);
document.getElementById('adminLogoutBtn').addEventListener('click', function (e) {
    e.preventDefault();
    logoutUser();
});

document.getElementById('profileDropdownToggle').addEventListener('click', function (e) {
    e.stopPropagation();
    document.getElementById('profileDropdownMenu').classList.toggle('open');
});

document.addEventListener('click', function (e) {
    const menu = document.getElementById('profileDropdownMenu');
    const toggle = document.getElementById('profileDropdownToggle');
    if (menu.classList.contains('open') && !menu.contains(e.target) && !toggle.contains(e.target)) {
        menu.classList.remove('open');
    }
});

document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
        document.getElementById('profileDropdownMenu').classList.remove('open');
    }
});

// ---------- Toasts ----------
function showToast(message, variant) {
    const host = document.getElementById('toastHost');
    const el = document.createElement('div');
    el.className = 'toast ' + (variant || '');
    el.innerHTML = `<span>${message}</span><button aria-label="Close">✕</button>`;
    host.appendChild(el);

    const remove = () => { if (el.parentNode) el.parentNode.removeChild(el); };
    el.querySelector('button').addEventListener('click', remove);
    setTimeout(remove, 2500);
}

// ---------- Cart badge ----------
function updateCartCount() {
    const badge = document.getElementById('cartCount');
    const count = cartItems.reduce((sum, item) => sum + (item.quantity || 0), 0);
    if (count > 0) {
        badge.textContent = count;
        badge.style.display = 'flex';
    } else {
        badge.style.display = 'none';
    }
}

// ---------- Load cart ----------
async function loadCart() {
    try {
        const response = await fetch(`${CART_URL}/${user.id}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.status === 401) {
            clearSession();
            window.location.href = '/login';
            return;
        }

        cartItems = response.ok ? await response.json() : [];
        displayCart();
    } catch (err) {
        console.error('Error loading cart:', err);
        cartItems = [];
        displayCart();
    }
}

function displayCart() {
    if (cartItems.length === 0) {
        displayEmptyCart();
        return;
    }

    const cartDiv = document.getElementById('cartItems');
    cartDiv.innerHTML = cartItems.map(item => `
        <div class="cart-item">
            <div class="item-image">
                ${item.images ? `<img src="${UPLOADS_URL}${item.images.split(',')[0]}" alt="${item.name}">` : '📷'}
            </div>
            <div class="item-info">
                <h3>${item.name}</h3>
                <p>${item.description || 'Product'}</p>
            </div>
            <div class="item-price">₱${parseFloat(item.price).toFixed(2)}</div>
            <div class="quantity-group">
                <button class="quantity-btn" ${item.quantity <= 1 ? 'disabled' : ''} onclick="updateQuantity(${item.id}, ${item.quantity - 1})">−</button>
                <input type="number" class="quantity-input" value="${item.quantity}" min="1"
                       onchange="updateQuantity(${item.id}, this.value)">
                <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
            </div>
            <button class="btn-remove" onclick="removeFromCart(${item.id})" title="Remove">×</button>
        </div>
    `).join('');

    document.getElementById('btnCheckout').disabled = false;
    updateSummary();
    updateCartCount();
}

function displayEmptyCart() {
    const cartDiv = document.getElementById('cartItems');
    cartDiv.innerHTML = `
        <div class="empty-cart">
            <div class="empty-cart-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="60" height="60">
                    <circle cx="9" cy="21" r="1"/>
                    <circle cx="20" cy="21" r="1"/>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                </svg>
            </div>
            <p>Your cart is empty</p>
            <a href="/shop" class="btn-continue-shopping">Continue Shopping</a>
        </div>
    `;
    document.getElementById('btnCheckout').disabled = true;
    updateSummary();
    updateCartCount();
}

function updateSummary() {
    const subtotal = cartItems.reduce((sum, item) => sum + (parseFloat(item.price) * item.quantity), 0);
    document.getElementById('subtotal').textContent = `₱${subtotal.toFixed(2)}`;
    document.getElementById('total').textContent = `₱${subtotal.toFixed(2)}`;
}

// ---------- Quantity ----------
async function updateQuantity(itemId, newQty) {
    const qty = parseInt(newQty);
    if (!qty || qty < 1) return;

    try {
        const response = await fetch(`${CART_URL}/${itemId}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ quantity: qty })
        });

        if (response.status === 401) {
            clearSession();
            window.location.href = '/login';
            return;
        }

        loadCart();
    } catch (err) {
        console.error('Error updating cart:', err);
        showToast('Could not update quantity.', 'danger');
    }
}

// ---------- Remove ----------
async function removeFromCart(itemId) {
    if (!(await showConfirm('Remove this item from cart?'))) return;

    try {
        const response = await fetch(`${CART_URL}/${itemId}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (response.status === 401) {
            clearSession();
            window.location.href = '/login';
            return;
        }

        showToast('Item removed from cart.', 'success');
        loadCart();
    } catch (err) {
        console.error('Error removing item:', err);
        showToast('Could not remove item.', 'danger');
    }
}

// ---------- Checkout ----------
document.getElementById('btnCheckout').addEventListener('click', () => {
    if (cartItems.length === 0) return;
    window.location.href = '/checkout';
});

refreshNav();
loadCart();
</script>
