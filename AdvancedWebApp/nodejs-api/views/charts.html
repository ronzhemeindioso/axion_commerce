<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Charts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4">📊 Sales Dashboard</h2>
    <div class="row g-4">
        <div class="col-md-6">
            <div class="card p-3 shadow-sm">
                <h5>Sales per Month (Bar)</h5>
                <canvas id="barChart"></canvas>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card p-3 shadow-sm">
                <h5>Orders Over Time (Line)</h5>
                <canvas id="lineChart"></canvas>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card p-3 shadow-sm">
                <h5>Order Status Distribution (Pie)</h5>
                <canvas id="pieChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script>
const API = 'http://localhost:5000/api';

async function loadCharts() {
    const [products, orders] = await Promise.all([
        $.get(`${API}/products`),
        $.get(`${API}/orders`)
    ]);

    // --- BAR CHART: sales per month ---
    const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const monthMap = {};
    monthNames.forEach(m => monthMap[m] = 0);

    orders.forEach(o => {
        const month = monthNames[new Date(o.created_at).getMonth()];
        monthMap[month] = (monthMap[month] || 0) + parseFloat(o.total_amount);
    });

    new Chart(document.getElementById('barChart'), {
        type: 'bar',
        data: {
            labels: monthNames,
            datasets: [{
                label: 'Sales (₱)',
                data: monthNames.map(m => monthMap[m]),
                backgroundColor: 'rgba(54, 162, 235, 0.7)',
                borderColor: 'rgba(54, 162, 235, 1)',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: (ctx) => '₱' + ctx.parsed.y.toLocaleString('en-PH', { minimumFractionDigits: 2 })
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        callback: (val) => '₱' + val.toLocaleString('en-PH')
                    }
                }
            }
        }
    });

    // --- LINE CHART: orders per day ---
    const dateMap = {};
    orders.forEach(o => {
        const date = new Date(o.created_at).toLocaleDateString();
        dateMap[date] = (dateMap[date] || 0) + 1;
    });

    new Chart(document.getElementById('lineChart'), {
        type: 'line',
        data: {
            labels: Object.keys(dateMap),
            datasets: [{
                label: 'Orders',
                data: Object.values(dateMap),
                borderColor: 'rgba(75, 192, 192, 1)',
                backgroundColor: 'rgba(75, 192, 192, 0.2)',
                tension: 0.4,
                fill: true
            }]
        },
        options: { responsive: true }
    });

    // --- PIE CHART: order status ---
    const statusMap = { pending: 0, confirmed: 0, cancelled: 0 };
    orders.forEach(o => { if (statusMap[o.status] !== undefined) statusMap[o.status]++; });

    new Chart(document.getElementById('pieChart'), {
        type: 'pie',
        data: {
            labels: ['Pending', 'Confirmed', 'Cancelled'],
            datasets: [{
                data: Object.values(statusMap),
                backgroundColor: ['#ffc107', '#198754', '#dc3545']
            }]
        },
        options: { responsive: true }
    });
}

loadCharts();
</script>
</body>
</html>
