<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
</head>
<body>

<div class="container mt-5">
    <h2>Products Management</h2>
    <a href="/" class="btn btn-secondary mb-3">← Back to Home</a>
    <a href="/users" class="btn btn-info mb-3 ms-2">👥 Users</a>
    <a href="/orders" class="btn btn-success mb-3 ms-2">📦 Orders</a>
    <button class="btn btn-primary mb-3 ms-2" id="btnAdd">Add Product</button>

    <table id="productsTable" class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Category</th>
                <th>Images</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<!-- Modal -->
<div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Product</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="productForm" novalidate>
                    <input type="hidden" id="productId">
                    <div class="mb-3">
                        <label>Name</label>
                        <input type="text" id="productName" name="productName" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>Description</label>
                        <textarea id="productDescription" name="productDescription" class="form-control"></textarea>
                    </div>
                    <div class="mb-3">
                        <label>Price</label>
                        <input type="number" id="productPrice" name="productPrice" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>Stock</label>
                        <input type="number" id="productStock" name="productStock" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>Category</label>
                        <input type="text" id="productCategory" name="productCategory" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label>Images (up to 5)</label>
                        <input type="file" id="productImages" class="form-control" multiple accept="image/*">
                    </div>
                    <div id="currentImages" class="mb-3"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="submit" form="productForm" class="btn btn-primary" id="btnSave">Save</button>
            </div>
        </div>
    </div>
</div>

<!-- Scripts — order matters -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
const API_URL = 'http://localhost:5000/api/products';
const UPLOADS_URL = 'http://localhost:5000/uploads/';
const token = localStorage.getItem('token');
let table;
let editMode = false;

// ── Load ALL products for admin table (fetch all pages) ──────
function loadProducts() {
    $.ajax({
        url: API_URL + '?page=1&limit=500',  // large limit to get all for admin view
        method: 'GET',
        success: function(response) {
            const data = response.data !== undefined ? response.data : response;

            if ($.fn.DataTable.isDataTable('#productsTable')) {
                $('#productsTable').DataTable().destroy();
            }
            $('#productsTable tbody').empty();
            table = $('#productsTable').DataTable({
                data: data,
                columns: [
                    { data: 'id' },
                    { data: 'name' },
                    { data: 'description' },
                    { data: 'price' },
                    { data: 'stock' },
                    { data: 'category' },
                    {
                        data: 'images',
                        render: function(images) {
                            if (!images) return 'No images';
                            return images.split(',').map(img =>
                                `<img src="${UPLOADS_URL}${img}" height="50" style="margin:2px; border-radius:4px;">`
                            ).join('');
                        }
                    },
                    {
                        data: 'id',
                        render: function(id) {
                            return `
                                <button class="btn btn-sm btn-warning btnEdit" data-id="${id}">Edit</button>
                                <button class="btn btn-sm btn-danger btnDelete" data-id="${id}">Delete</button>
                            `;
                        }
                    }
                ]
            });
        },
        error: function(xhr) {
            console.log('Error loading products:', xhr.status, xhr.responseText);
        }
    });
}

// ── Save product (called by validator) ──────────────────────
function saveProduct() {
    const formData = new FormData();
    formData.append('name', $('#productName').val());
    formData.append('description', $('#productDescription').val());
    formData.append('price', $('#productPrice').val());
    formData.append('stock', $('#productStock').val());
    formData.append('category', $('#productCategory').val());

    const files = $('#productImages')[0].files;
    for (let i = 0; i < files.length; i++) {
        formData.append('images', files[i]);
    }

    const url = editMode ? API_URL + '/' + $('#productId').val() : API_URL;
    const method = editMode ? 'PUT' : 'POST';

    $.ajax({
        url, method,
        headers: { 'Authorization': 'Bearer ' + token },
        data: formData,
        processData: false,
        contentType: false,
        success: function() {
            $('#productModal').modal('hide');
            loadProducts();
        },
        error: function() {
            alert('Error saving product');
        }
    });
}

// ── Add button ───────────────────────────────────────────────
$('#btnAdd').click(function() {
    editMode = false;
    $('#productId').val('');
    $('#productName').val('');
    $('#productDescription').val('');
    $('#productPrice').val('');
    $('#productStock').val('');
    $('#productCategory').val('');
    $('#productImages').val('');
    $('#currentImages').html('');

    if ($('#productForm').data('validator')) {
        $('#productForm').data('validator').resetForm();
    }
    $('#productForm .is-invalid').removeClass('is-invalid');
    $('#productForm .is-valid').removeClass('is-valid');

    $('#productModal').modal('show');
});

// ── Edit button ──────────────────────────────────────────────
$(document).on('click', '.btnEdit', function() {
    editMode = true;
    const id = $(this).data('id');
    $.ajax({
        url: API_URL + '/' + id,
        method: 'GET',
        success: function(product) {
            $('#productId').val(product.id);
            $('#productName').val(product.name);
            $('#productDescription').val(product.description);
            $('#productPrice').val(product.price);
            $('#productStock').val(product.stock);
            $('#productCategory').val(product.category);
            $('#productImages').val('');

            if (product.images) {
                const imgs = product.images.split(',').map(img =>
                    `<img src="${UPLOADS_URL}${img}" height="60" style="margin:2px; border-radius:4px;">`
                ).join('');
                $('#currentImages').html('<label>Current Images:</label><br>' + imgs);
            } else {
                $('#currentImages').html('');
            }

            if ($('#productForm').data('validator')) {
                $('#productForm').data('validator').resetForm();
            }
            $('#productForm .is-invalid').removeClass('is-invalid');
            $('#productForm .is-valid').removeClass('is-valid');

            $('#productModal').modal('show');
        }
    });
});

// ── Delete button ────────────────────────────────────────────
$(document).on('click', '.btnDelete', function() {
    if (confirm('Are you sure you want to delete this product?')) {
        const id = $(this).data('id');
        $.ajax({
            url: API_URL + '/' + id,
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token },
            success: function() { loadProducts(); },
            error: function() { alert('Error deleting product'); }
        });
    }
});

// ── Init ─────────────────────────────────────────────────────
$(document).ready(function() {
    loadProducts();

    $('#productForm').validate({
        rules: {
            productName:        { required: true, minlength: 2 },
            productPrice:       { required: true, number: true, min: 0 },
            productStock:       { required: true, digits: true, min: 0 },
            productCategory:    { required: true }
        },
        messages: {
            productName: {
                required: 'Product name is required',
                minlength: 'At least 2 characters'
            },
            productPrice: {
                required: 'Price is required',
                number: 'Must be a valid number',
                min: 'Must be 0 or more'
            },
            productStock: {
                required: 'Stock is required',
                digits: 'Must be a whole number',
                min: 'Must be 0 or more'
            },
            productCategory: {
                required: 'Category is required'
            }
        },
        errorClass: 'is-invalid',
        validClass: 'is-valid',
        errorElement: 'div',
        errorPlacement: function(error, element) {
            error.addClass('invalid-feedback');
            element.after(error);
        },
        highlight: function(element) {
            $(element).addClass('is-invalid').removeClass('is-valid');
        },
        unhighlight: function(element) {
            $(element).removeClass('is-invalid').addClass('is-valid');
        },
        submitHandler: function() {
            saveProduct();
        }
    });
});
</script>

</body>
</html>
