<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Orders</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <style>
        body { background: #f8f9fa; }
        .navbar { background: #1a1a2e; }
        .badge-pending    { background: #ffc107; color: #000; }
        .badge-confirmed  { background: #198754; color: #fff; }
        .badge-cancelled  { background: #dc3545; color: #fff; }
        .table-responsive { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark px-4 py-3 mb-4">
    <span class="navbar-brand fw-bold fs-5">🛒 Admin — Orders</span>
    <span id="admin-label" class="text-white-50 small"></span>
</nav>

<div class="container-fluid px-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">All Orders</h5>
        <span id="total-badge" class="badge bg-secondary fs-6">Loading...</span>
    </div>

    <div class="table-responsive">
        <table id="ordersTable" class="table table-hover align-middle w-100">
            <thead class="table-dark">
                <tr>
                    <th>Order ID</th>
                    <th>User ID</th>
                    <th>Total Amount</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<!-- View Items Modal -->
<div class="modal fade" id="viewModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Order Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="order-meta" class="mb-3"></div>
                <table class="table table-bordered table-sm">
                    <thead class="table-secondary">
                        <tr>
                            <th>Product</th>
                            <th>Price</th>
                            <th>Qty</th>
                            <th>Subtotal</th>
                        </tr>
                    </thead>
                    <tbody id="order-items-body"></tbody>
                </table>
                <div id="order-total" class="text-end fw-bold"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<!-- Update Status Modal -->
<div class="modal fade" id="statusModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Update Order Status</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="status-order-id">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Select Status</label>
                    <select id="status-select" class="form-select">
                        <option value="pending">Pending</option>
                        <option value="confirmed">Confirmed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Customer Email <span class="text-muted fw-normal">(receipt will be sent here)</span></label>
                    <input type="email" id="status-email" class="form-control" placeholder="customer@email.com">
                    <div class="form-text">Leave blank to skip sending email.</div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" id="btnSaveStatus">Save</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title text-danger">Delete Order</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                Are you sure you want to delete <strong id="delete-order-label"></strong>? This cannot be undone.
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-danger" id="btnConfirmDelete">Delete</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
    const API = 'http://localhost:5000/api';
    const token = localStorage.getItem('token');
    let deleteTargetId = null;
    let ordersTable;

    const statusBadge = (status) => {
        const cls = { pending: 'badge-pending', confirmed: 'badge-confirmed', cancelled: 'badge-cancelled' };
        return `<span class="badge ${cls[status] || 'bg-secondary'}">${status}</span>`;
    };

    const formatCurrency = (val) => '₱' + parseFloat(val).toLocaleString('en-PH', { minimumFractionDigits: 2 });

    // ── Load all orders ──────────────────────────────────────────
    function loadOrders() {
        $.ajax({
            url: `${API}/orders`,
            method: 'GET',
            headers: { 'Authorization': 'Bearer ' + token },
            success: function (data) {
                $('#total-badge').text(`${data.length} Orders`);
                ordersTable.clear();
                data.forEach(order => {
                    ordersTable.row.add([
                        `#${order.id}`,
                        order.user_id,
                        formatCurrency(order.total_amount),
                        statusBadge(order.status),
                        new Date(order.created_at).toLocaleString(),
                        `<button class="btn btn-sm btn-info me-1" onclick="viewOrder(${order.id})">View</button>
                        <button class="btn btn-sm btn-warning me-1" onclick="openStatusModal(${order.id}, '${order.status}')">Status</button>
                        <button class="btn btn-sm btn-danger" onclick="openDeleteModal(${order.id})">Delete</button>`
                    ]);
                });
                ordersTable.draw();
            }
        });
    }

    // ── View order items ─────────────────────────────────────────
    function viewOrder(id) {
         $.ajax({
            url: `${API}/orders/${id}`,
            method: 'GET',
            headers: { 'Authorization': 'Bearer ' + token },
            success: function (data) {
                $('#order-meta').html(`
                    <p class="mb-1"><strong>Order ID:</strong> #${data.id}</p>
                    <p class="mb-1"><strong>User ID:</strong> ${data.user_id}</p>
                    <p class="mb-1"><strong>Status:</strong> ${statusBadge(data.status)}</p>
                    <p class="mb-1"><strong>Date:</strong> ${new Date(data.created_at).toLocaleString()}</p>
                `);

                let rows = '';
                data.items.forEach(item => {
                    rows += `<tr>
                        <td>${item.name}</td>
                        <td>${formatCurrency(item.price)}</td>
                        <td>${item.quantity}</td>
                        <td>${formatCurrency(item.subtotal)}</td>
                    </tr>`;
                });

                $('#order-items-body').html(rows);
                $('#order-total').text('Total: ' + formatCurrency(data.total_amount));
                new bootstrap.Modal(document.getElementById('viewModal')).show();
            },
            error: function () {
                alert('Failed to load order details.');
            }
        });
    }

    // ── Open status modal ────────────────────────────────────────
    function openStatusModal(id, currentStatus) {
        $('#status-order-id').val(id);
        $('#status-select').val(currentStatus);
        $('#status-email').val('');
        new bootstrap.Modal(document.getElementById('statusModal')).show();
    }

    // ── Save status + send email ─────────────────────────────────
    $(document).on('click', '#btnSaveStatus', function () {
        const id    = $('#status-order-id').val();
        const status = $('#status-select').val();
        const email  = $('#status-email').val().trim();

        $('#btnSaveStatus').prop('disabled', true).text('Saving...');

        $.ajax({
            url: `${API}/orders/${id}/status`,
            method: 'PUT',
            headers: { 'Authorization': 'Bearer ' + token },
            contentType: 'application/json',
            data: JSON.stringify({ status, email }),
            success: function (res) {
                bootstrap.Modal.getInstance(document.getElementById('statusModal')).hide();
                alert(res.message);
                loadOrders();
            },
            error: function (xhr) {
                alert('Failed: ' + (xhr.responseJSON?.error || xhr.responseJSON?.message || 'Unknown error'));
            },
            complete: function () {
                $('#btnSaveStatus').prop('disabled', false).text('Save');
            }
        });
    });

    // ── Open delete modal ────────────────────────────────────────
    function openDeleteModal(id) {
        deleteTargetId = id;
        $('#delete-order-label').text(`Order #${id}`);
        new bootstrap.Modal(document.getElementById('deleteModal')).show();
    }

    // ── Confirm delete ───────────────────────────────────────────
    $(document).on('click', '#btnConfirmDelete', function () {
        $(this).prop('disabled', true).text('Deleting...');

        $.ajax({
            url: `${API}/orders/${deleteTargetId}`,
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token },
            success: function () {
                bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
                loadOrders();
            },
            error: function () {
                alert('Failed to delete order.');
            },
            complete: function () {
                $('#btnConfirmDelete').prop('disabled', false).text('Delete');
            }
        });
    });

    // ── Init DataTable ───────────────────────────────────────────
    $(document).ready(function () {
        ordersTable = $('#ordersTable').DataTable({
            columns: [
                { title: 'Order ID' },
                { title: 'User ID' },
                { title: 'Total Amount' },
                { title: 'Status' },
                { title: 'Date' },
                { title: 'Actions', orderable: false }
            ],
            order: [[0, 'desc']],
            pageLength: 10
        });

        loadOrders();
    });
</script>
</body>
</html>
