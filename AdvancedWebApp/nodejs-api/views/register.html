<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // If a valid session already exists, don't show the register form —
        // send the user straight to where they belong.
        (function () {
            var token = localStorage.getItem('token');
            var user = JSON.parse(localStorage.getItem('user') || 'null');
            if (token && user) {
                window.location.replace(user.role === 'admin' ? '/products' : '/shop');
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Aperture</title>
    <style>
        :root {
            --seashell:        #FEFBF9;
            --wheat:           #F6E0B6;
            --powder-blue:     #948078;
            --french-blue:     #C1745B;
            --midnight-violet: #A8654E;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #FEFBF9;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .register-wrapper {
            display: flex;
            width: 820px;
            height: 600px;
            max-height: 90vh;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(193,116,91,0.20);
        }

        /* ── Left panel — same warm terracotta gradient + photo overlay as login ── */
        .left-panel {
            width: 300px;
            flex-shrink: 0;
            background:
                linear-gradient(160deg, rgba(212,139,112,0.86) 0%, rgba(193,116,91,0.88) 55%, rgba(176,106,80,0.92) 100%),
                url('https://i.pinimg.com/1200x/ea/99/18/ea99181e51b51d36e6b1f4d049614983.jpg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2.8rem 2.4rem;
            position: relative;
            overflow: hidden;
        }

        .brand { position: relative; z-index: 1; }

        .brand-name {
            font-size: .75rem;
            font-weight: 700;
            color: rgba(255,255,255,0.92);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .left-body { position: relative; z-index: 1; }

        .left-body h2 {
            font-size: 1.8rem;
            font-weight: 800;
            color: #fff;
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        .left-body h2 em {
            font-style: normal;
            color: var(--wheat);
        }

        .left-body p {
            font-size: .8rem;
            color: rgba(255,244,235,0.82);
            line-height: 1.75;
        }

        .left-footer {
            position: relative; z-index: 1;
            font-size: .66rem;
            color: rgba(255,255,255,0.32);
            letter-spacing: .4px;
        }

        .right-panel {
            flex: 1;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2.8rem 3rem;
            overflow: hidden;
        }

        .form-header { margin-bottom: 2rem; }

        .form-header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--midnight-violet);
            letter-spacing: -.4px;
            margin-bottom: .3rem;
        }

        .form-header p {
            font-size: .8rem;
            color: var(--powder-blue);
        }

        .field-row { display: flex; gap: 1rem; }
        .field-row .field { flex: 1; }

        .field { margin-bottom: 1rem; }

        .field label {
            display: block;
            font-size: .67rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .9px;
            color: var(--midnight-violet);
            opacity: .55;
            margin-bottom: .4rem;
        }

        .field input {
            width: 100%;
            padding: .65rem 1rem;
            border: 1.5px solid #F8EFEA;
            border-radius: 10px;
            font-size: .875rem;
            color: var(--midnight-violet);
            background: #FEFBF9;
            outline: none;
            transition: border-color .15s, box-shadow .15s, background .15s;
            font-family: inherit;
        }

        .field input:focus {
            border-color: var(--french-blue);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(193,116,91,0.10);
        }

        .field input::placeholder {
            color: #D8B6AA;
            font-size: .85rem;
        }

        .field input.error-field {
            border-color: #EFC2BE;
            background: #FBEBEA;
        }

        .pw-wrap { position: relative; }
        .pw-wrap input { padding-right: 2.8rem; }

        .toggle-pw {
            position: absolute;
            right: .9rem;
            top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            opacity: .4; padding: 0; line-height: 1;
            transition: opacity .13s;
            color: var(--midnight-violet);
        }
        .toggle-pw:hover { opacity: .7; }

        .error-msg {
            background: #FBEBEA;
            border: 1px solid #EFC2BE;
            border-radius: 8px;
            padding: .65rem .9rem;
            font-size: .8rem;
            font-weight: 600;
            color: #D6483F;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: .55rem;
            animation: errorShake .35s ease;
        }
        .error-msg.hidden { display: none; }
        .error-icon { flex-shrink: 0; opacity: .9; }

        @keyframes errorShake {
            0%   { transform: translateX(0); opacity: 0; }
            25%  { transform: translateX(-4px); opacity: 1; }
            50%  { transform: translateX(3px); }
            75%  { transform: translateX(-2px); }
            100% { transform: translateX(0); }
        }

        .btn-register {
            width: 100%;
            margin-top: 1.4rem;
            padding: .75rem;
            background: linear-gradient(135deg, #C1745B 0%, #A8654E 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: .875rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: .3px;
            display: flex; align-items: center; justify-content: center; gap: .5rem;
            transition: box-shadow .2s, transform .12s;
            font-family: inherit;
            box-shadow: 0 4px 14px rgba(193,116,91,0.28);
        }
        .btn-register:hover {
            box-shadow: 0 6px 20px rgba(193,116,91,0.38);
            transform: translateY(-1px);
        }
        .btn-register:active { transform: translateY(0); box-shadow: 0 3px 10px rgba(193,116,91,0.28); }
        .btn-register .arrow { transition: transform .15s; font-style: normal; }
        .btn-register:hover .arrow { transform: translateX(3px); }

        .login-row {
            text-align: center;
            margin-top: 1.2rem;
            font-size: .77rem;
            color: var(--powder-blue);
        }
        .login-row a {
            color: var(--midnight-violet);
            font-weight: 700;
            text-decoration: none;
            transition: color .13s;
        }
        .login-row a:hover { color: var(--french-blue); }
    </style>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

<div class="register-wrapper">

    <!-- Left panel -->
    <div class="left-panel">
        <div class="brand">
            <div class="brand-name">Aperture</div>
        </div>

        <div class="left-body">
            <h2>Join the <em>community.</em></h2>
            <p>Create your account and start exploring premium cameras and gear.</p>
        </div>

        <div class="left-footer">© 2025 Aperture Store</div>
    </div>

    <!-- Right panel -->
    <div class="right-panel">

        <div class="form-header">
            <h1>Create account</h1>
            <p>Fill in your details to get started</p>
        </div>

        <div class="error-msg hidden" id="errorMsg">
            <svg class="error-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span id="errorText">Something went wrong.</span>
        </div>

        <form id="registerForm" novalidate>

            <div class="field-row">
                <div class="field">
                    <label for="firstName">First name</label>
                   <input type="text" id="firstName" placeholder="Juan" autocomplete="given-name">
                </div>
                <div class="field">
                    <label for="lastName">Last name</label>
                    <input type="text" id="lastName" placeholder="Dela Cruz" autocomplete="family-name">
                </div>
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input type="text" id="email" placeholder="you@gmail.com" autocomplete="email">
            </div>

            <div class="field">
                <label for="password">Password</label>
                <div class="pw-wrap">
                    <input type="password" id="password" placeholder="Create a password" autocomplete="new-password">
                    <button type="button" class="toggle-pw" id="togglePw" aria-label="Show or hide password">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>

            <div class="field">
                <label for="confirmPassword">Confirm password</label>
                <div class="pw-wrap">
                    <input type="password" id="confirmPassword" placeholder="Repeat your password" autocomplete="new-password">
                    <button type="button" class="toggle-pw" id="toggleConfirm" aria-label="Show or hide password">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-register">
                Create Account <em class="arrow">→</em>
            </button>

        </form>

        <div class="login-row">
            Already have an account? <a href="/login">Sign in</a>
        </div>

    </div>
</div>

<script>
    const eyeOpen = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const eyeOff  = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

    function makeToggle(btnId, inputId) {
        document.getElementById(btnId).addEventListener('click', function () {
            const input = document.getElementById(inputId);
            const isText = input.type === 'text';
            input.type = isText ? 'password' : 'text';
            this.innerHTML = isText ? eyeOpen : eyeOff;
        });
    }

    makeToggle('togglePw', 'password');
    makeToggle('toggleConfirm', 'confirmPassword');

    $('#registerForm').on('submit', function (e) {
        e.preventDefault();

        const firstName       = $('#firstName').val().trim();
        const lastName        = $('#lastName').val().trim();
        const email           = $('#email').val().trim();
        const password        = $('#password').val();
        const confirmPassword = $('#confirmPassword').val();
        const $errorMsg       = $('#errorMsg');
        const $errorTxt       = $('#errorText');
        const $btn            = $('.btn-register');

        if (!firstName || !lastName || !email || !password || !confirmPassword) {
            $errorTxt.text('Please fill in all fields.');
            $errorMsg.removeClass('hidden');
            return;
        }

        if (!/^[^\s@]+@gmail\.com$/i.test(email)) {
            $errorTxt.text('Please use a valid Gmail address (e.g. you@gmail.com).');
            $errorMsg.removeClass('hidden');
            return;
        }

        if (password !== confirmPassword) {
            $errorTxt.text('Passwords do not match.');
            $errorMsg.removeClass('hidden');
            return;
        }

        if (password.length < 8) {
            $errorTxt.text('Password must be at least 8 characters.');
            $errorMsg.removeClass('hidden');
            return;
        }

        $errorMsg.addClass('hidden');
        $btn.html('Creating account… <em class="arrow">→</em>');
        $btn.prop('disabled', true);

        $.ajax({
            url: '/api/auth/register',
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ firstName, lastName, email, password }),
            dataType: 'json'
        })
        .done(function (data) {
            if (data.token) localStorage.setItem('token', data.token);
            if (data.user)  localStorage.setItem('user', JSON.stringify(data.user));
            sessionStorage.setItem('canAccessSetupProfile', '1');
            window.location.href = '/setup-profile';
        })
        .fail(function (jqXHR) {
            const data = jqXHR.responseJSON || {};
            $errorTxt.text(data.message || 'Registration failed.');
            $errorMsg.removeClass('hidden');
        })
        .always(function () {
            $btn.html('Create Account <em class="arrow">→</em>');
            $btn.prop('disabled', false);
        });
    });
</script>

</body>
</html>
