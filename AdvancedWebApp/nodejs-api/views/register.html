<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Aperture</title>
    <style>
        :root {
            --seashell:        #FFF4EB;
            --wheat:           #F6E0B6;
            --powder-blue:     #A6BCC9;
            --french-blue:     #3E4B8E;
            --midnight-violet: #3D1534;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #dde4ec;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .register-wrapper {
            display: flex;
            width: 820px;
            min-height: 500px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(62,75,142,0.18);
        }

        .left-panel {
            width: 300px;
            flex-shrink: 0;
            background: var(--french-blue);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2.8rem 2.4rem;
            position: relative;
            overflow: hidden;
        }

        .left-panel::before {
            content: '';
            position: absolute;
            width: 300px; height: 300px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            top: -100px; right: -120px;
            pointer-events: none;
        }

        .left-panel::after {
            content: '';
            position: absolute;
            width: 260px; height: 260px;
            border-radius: 50%;
            background: rgba(166,188,201,0.08);
            bottom: -100px; left: -60px;
            pointer-events: none;
        }

        .brand { position: relative; z-index: 1; }

        .brand-name {
            font-size: .75rem;
            font-weight: 700;
            color: rgba(255,255,255,0.9);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .left-body { position: relative; z-index: 1; }

        .left-body h2 {
            font-size: 1.8rem;
            font-weight: 800;
            color: #fff;
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        .left-body h2 em {
            font-style: normal;
            color: var(--wheat);
        }

        .left-body p {
            font-size: .8rem;
            color: rgba(166,188,201,0.75);
            line-height: 1.75;
        }

        .left-footer {
            position: relative; z-index: 1;
            font-size: .66rem;
            color: rgba(255,255,255,0.2);
            letter-spacing: .4px;
        }

        .right-panel {
            flex: 1;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2.8rem 3rem;
        }

        .form-header { margin-bottom: 2rem; }

        .form-header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--midnight-violet);
            letter-spacing: -.4px;
            margin-bottom: .3rem;
        }

        .form-header p {
            font-size: .8rem;
            color: var(--powder-blue);
        }

        .field-row { display: flex; gap: 1rem; }
        .field-row .field { flex: 1; }

        .field { margin-bottom: 1rem; }

        .field label {
            display: block;
            font-size: .67rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .9px;
            color: var(--midnight-violet);
            opacity: .45;
            margin-bottom: .4rem;
        }

        .field input {
            width: 100%;
            padding: .65rem 1rem;
            border: 1.5px solid #eceef4;
            border-radius: 10px;
            font-size: .875rem;
            color: var(--midnight-violet);
            background: #fafbfc;
            outline: none;
            transition: border-color .15s, box-shadow .15s, background .15s;
            font-family: inherit;
        }

        .field input:focus {
            border-color: var(--french-blue);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(62,75,142,0.08);
        }

        .field input::placeholder {
            color: #c8ccd8;
            font-size: .85rem;
        }

        .field input.error-field {
            border-color: #f5c2c2;
            background: #fdf8f8;
        }

        .pw-wrap { position: relative; }
        .pw-wrap input { padding-right: 2.8rem; }

        .toggle-pw {
            position: absolute;
            right: .9rem;
            top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            opacity: .3; padding: 0; line-height: 1;
            transition: opacity .13s;
            color: var(--midnight-violet);
        }
        .toggle-pw:hover { opacity: .6; }

        .strength-bar {
            display: flex;
            gap: 4px;
            margin-top: .45rem;
        }

        .strength-bar span {
            flex: 1;
            height: 3px;
            border-radius: 2px;
            background: #eceef4;
            transition: background .25s;
        }

        .strength-label {
            font-size: .67rem;
            margin-top: .3rem;
            color: var(--powder-blue);
            opacity: .7;
            min-height: 1em;
        }

        .error-msg {
            background: #fdf0f0;
            border: 1px solid #f5c2c2;
            border-radius: 8px;
            padding: .55rem .9rem;
            font-size: .78rem;
            color: #b83232;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }
        .error-msg.hidden { display: none; }

        .btn-register {
            width: 100%;
            margin-top: 1.4rem;
            padding: .75rem;
            background: var(--french-blue);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: .875rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: .3px;
            display: flex; align-items: center; justify-content: center; gap: .5rem;
            transition: background .15s, transform .12s;
            font-family: inherit;
        }
        .btn-register:hover {
            background: var(--midnight-violet);
            transform: translateY(-1px);
        }
        .btn-register:active { transform: translateY(0); }
        .btn-register .arrow { transition: transform .15s; font-style: normal; }
        .btn-register:hover .arrow { transform: translateX(3px); }

        .login-row {
            text-align: center;
            margin-top: 1.2rem;
            font-size: .77rem;
            color: var(--powder-blue);
        }
        .login-row a {
            color: var(--french-blue);
            font-weight: 700;
            text-decoration: none;
            transition: color .13s;
        }
        .login-row a:hover { color: var(--midnight-violet); }
    </style>
</head>
<body>

<div class="register-wrapper">

    <!-- Left panel -->
    <div class="left-panel">
        <div class="brand">
            <div class="brand-name">Aperture</div>
        </div>

        <div class="left-body">
            <h2>Join the <em>community.</em></h2>
            <p>Create your account and start exploring premium cameras and gear.</p>
        </div>

        <div class="left-footer">© 2025 Aperture Store</div>
    </div>

    <!-- Right panel -->
    <div class="right-panel">

        <div class="form-header">
            <h1>Create account</h1>
            <p>Fill in your details to get started</p>
        </div>

        <div class="error-msg hidden" id="errorMsg">
            ⚠️ <span id="errorText">Something went wrong.</span>
        </div>

        <form id="registerForm" novalidate>

            <div class="field-row">
                <div class="field">
                    <label for="firstName">First name</label>
                    <input type="text" id="firstName" placeholder="Juan" autocomplete="given-name">
                </div>
                <div class="field">
                    <label for="lastName">Last name</label>
                    <input type="text" id="lastName" placeholder="Dela Cruz" autocomplete="family-name">
                </div>
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
            </div>

            <div class="field">
                <label for="password">Password</label>
                <div class="pw-wrap">
                    <input type="password" id="password" placeholder="Create a password" autocomplete="new-password">
                    <button type="button" class="toggle-pw" id="togglePw" aria-label="Show or hide password">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
                <div class="strength-bar">
                    <span id="s1"></span><span id="s2"></span><span id="s3"></span><span id="s4"></span>
                </div>
                <div class="strength-label" id="strengthLabel"></div>
            </div>

            <div class="field">
                <label for="confirmPassword">Confirm password</label>
                <div class="pw-wrap">
                    <input type="password" id="confirmPassword" placeholder="Repeat your password" autocomplete="new-password">
                    <button type="button" class="toggle-pw" id="toggleConfirm" aria-label="Show or hide password">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-register">
                Create Account <em class="arrow">→</em>
            </button>

        </form>

        <div class="login-row">
            Already have an account? <a href="/login">Sign in</a>
        </div>

    </div>
</div>

<script>
    const eyeOpen = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const eyeOff  = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

    function makeToggle(btnId, inputId) {
        document.getElementById(btnId).addEventListener('click', function () {
            const input = document.getElementById(inputId);
            const isText = input.type === 'text';
            input.type = isText ? 'password' : 'text';
            this.innerHTML = isText ? eyeOpen : eyeOff;
        });
    }

    makeToggle('togglePw', 'password');
    makeToggle('toggleConfirm', 'confirmPassword');

    const strengthColors = ['#f5c2c2', '#f6c26b', '#7bc47b', '#3E4B8E'];
    const strengthLabels = ['Weak', 'Fair', 'Good', 'Strong'];

    document.getElementById('password').addEventListener('input', function () {
        const val = this.value;
        let score = 0;
        if (val.length >= 8)          score++;
        if (/[A-Z]/.test(val))        score++;
        if (/[0-9]/.test(val))        score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        for (let i = 1; i <= 4; i++) {
            const bar = document.getElementById('s' + i);
            bar.style.background = i <= score ? strengthColors[score - 1] : '#eceef4';
        }

        document.getElementById('strengthLabel').textContent = val.length ? strengthLabels[score - 1] || '' : '';
    });

    document.getElementById('registerForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const firstName       = document.getElementById('firstName').value.trim();
        const lastName        = document.getElementById('lastName').value.trim();
        const email           = document.getElementById('email').value.trim();
        const password        = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const errorMsg        = document.getElementById('errorMsg');
        const errorTxt        = document.getElementById('errorText');
        const btn             = document.querySelector('.btn-register');

        if (!firstName || !lastName || !email || !password || !confirmPassword) {
            errorTxt.textContent = 'Please fill in all fields.';
            errorMsg.classList.remove('hidden');
            return;
        }

        if (password !== confirmPassword) {
            errorTxt.textContent = 'Passwords do not match.';
            errorMsg.classList.remove('hidden');
            return;
        }

        if (password.length < 8) {
            errorTxt.textContent = 'Password must be at least 8 characters.';
            errorMsg.classList.remove('hidden');
            return;
        }

        errorMsg.classList.add('hidden');
        btn.innerHTML = 'Creating account… <em class="arrow">→</em>';
        btn.disabled = true;

        try {
            const res = await fetch('http://localhost:5000/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ firstName, lastName, email, password })
            });

            const data = await res.json();

            if (res.ok) {
                if (data.token) localStorage.setItem('token', data.token);
                if (data.user)  localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = '/setup-profile';
            } else {
                errorTxt.textContent = data.message || 'Registration failed.';
                errorMsg.classList.remove('hidden');
            }
        } catch (err) {
            errorTxt.textContent = 'Could not connect to server.';
            errorMsg.classList.remove('hidden');
        } finally {
            btn.innerHTML = 'Create Account <em class="arrow">→</em>';
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
